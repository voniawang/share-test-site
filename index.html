<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天禧AI - 主页</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b0c;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC',
                   'Microsoft YaHei', sans-serif;
    }

    /* ── 全页背景（浏览器外壳截图） ── */
    .bg-shell {
      position: fixed;
      inset: 0;
      background: url('bg.png') center / cover no-repeat;
      pointer-events: none;
      z-index: 0;
    }
    body.dual-mode .bg-shell {
      background-image: url('bg2.png');
    }

    /* ── 内容区（覆盖在背景黑色大区域上）── */
    /* bg.png 中侧边栏约 80px，顶栏约 55px（按 2400x1540 原图） */
    .content-area {
      position: fixed;
      left: 80px;
      top: 55px;
      right: 0;
      bottom: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      overflow-y: auto;
    }
    .content-area::-webkit-scrollbar { display: none; }

    /* 宽度容器 */
    .content-inner {
      width: 838px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding-top: 88px;
    }

    /* ── 标题 ── */
    .hero-title {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px; /* 标题距下方 Feature 图片 20px */
    }
    .hero-logo {
      width: 46px;
      height: 46px;
      flex-shrink: 0;
      display: block;
      object-fit: contain;
    }
    .hero-title-text {
      font-size: 30px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    /* ── Tab 导航（图片） ── */
    .tab-bar {
      margin-bottom: 10px; /* Feature 图片距输入框 10px */
      margin-left: -20px;
    }
    .tab-bar img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── 输入框（彩虹光圈） ── */
    .input-wrap {
      width: 100%;
      max-width: 838px;
      position: relative;
      margin-bottom: 18px;
    }

    /* 彩虹渐变边框层 —— 默认态（无超能）*/
    .input-glow {
      position: relative;
      border-radius: 18px;
      padding: 1.5px;
      background: linear-gradient(
        125deg,
        #39ff14 0%, #00e5ff 18%, #651fff 36%,
        #e040fb 50%, #ff1744 64%, #ff6d00 78%,
        #ffd600 92%, #39ff14 100%
      );
      background-size: 200% 200%;
      animation: gradientShift 4s ease infinite;
      box-shadow:
        0 0 18px rgba(57,255,20,.18),
        0 0 36px rgba(224,64,251,.14),
        0 0 56px rgba(255,23,68,.10),
        0 0 80px rgba(101,31,255,.08);
      transition: box-shadow .4s, background .4s;
    }
    /* 超能激活态：#8AD8FF 流光边框 + #0088FF 弥散投影 */
    .input-glow.active {
      background: linear-gradient(
        125deg,
        #8AD8FF 0%, #62E0FF 25%, #00AAFF 50%,
        #8AD8FF 75%, #62E0FF 100%
      );
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      box-shadow:
        0 0 24px rgba(0,136,255,.55),
        0 0 60px rgba(0,136,255,.28),
        0 0 100px rgba(0,136,255,.12);
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .input-inner {
      background: #111214;
      border-radius: 17px;
      padding: 18px 20px 14px;
      min-height: 148px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .input-field {
      background: transparent;
      border: none;
      outline: none;
      color: rgba(255,255,255,.85);
      font-size: 15px;
      line-height: 1.6;
      width: 100%;
      resize: none;
      font-family: inherit;
      flex: 1;
      min-height: 72px;
    }
    .input-field::placeholder { color: rgba(255,255,255,.28); }

    .input-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .input-actions { margin-left: auto; }
    .mode-btns { display: flex; gap: 8px; align-items: center; }
    .mode-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      padding: 0;
      cursor: pointer;
      border: none;
      background: transparent;
      transition: opacity .18s;
      user-select: none;
    }
    .mode-btn img {
      height: 32px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }
    .mode-btn:hover { opacity: .88; }
    .super-mode {
      justify-content: flex-start;
      gap: 6px;
      width: 81px;
      padding: 0 13px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.58);
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      transition:
        color .22s ease,
        opacity .18s ease,
        box-shadow .26s ease,
        background .26s ease,
        border-color .26s ease,
        padding .26s ease,
        width .26s ease;
    }
    .super-mode.on {
      width: 300px;
      padding-right: 4px;
      border-color: rgba(98,224,255,.38);
      background:
        linear-gradient(180deg, rgba(80,210,255,.24), rgba(0,136,255,.12)),
        rgba(8,24,34,.82);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        0 0 20px rgba(0,136,255,.18);
      color: #8AD8FF;
    }
    .super-mode-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      transition: transform .26s ease, filter .26s ease;
    }
    .super-mode.on .super-mode-icon {
      transform: scale(1.06);
      filter: drop-shadow(0 0 8px rgba(98,224,255,.65));
    }
    .super-mode-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .2px;
      line-height: 1;
      white-space: nowrap;
    }
    .super-mode-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      max-width: 0;
      opacity: 0;
      transform: translateX(-6px);
      overflow: hidden;
      color: rgba(210,246,255,.88);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
      user-select: none;
      transition: max-width .28s ease, opacity .22s ease, transform .28s ease;
    }
    .super-mode.on .super-mode-status {
      max-width: 258px;
      opacity: 1;
      transform: translateX(0);
    }
    .super-mode-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #62E0FF;
      box-shadow: 0 0 10px rgba(98,224,255,.85);
      flex-shrink: 0;
    }
    .super-mode-title {
      font-weight: 500;
      letter-spacing: .2px;
    }
    .super-mode-energy {
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(98,224,255,.14);
      border: 1px solid rgba(98,224,255,.2);
      color: #8AD8FF;
      font-weight: 600;
      flex-shrink: 0;
      display: inline-block;
    }

    .agent-mode {
      justify-content: flex-start;
      gap: 6px;
      padding: 0 13px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.58);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      transition: background .18s, border-color .18s, color .18s;
    }
    .agent-mode:hover {
      background: rgba(255,255,255,.07);
      border-color: rgba(255,255,255,.2);
      color: rgba(255,255,255,.8);
    }

    .input-actions { display: flex; align-items: center; gap: 14px; }
    .act-icon {
      color: rgba(255,255,255,.38);
      cursor: pointer;
      transition: color .18s;
      display: flex;
    }
    .act-icon:hover { color: rgba(255,255,255,.75); }

    .send-btn {
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: block;
      flex-shrink: 0;
      transition: opacity .18s;
    }
    .send-btn:hover { opacity: .8; }

    /* ── 底部卡片图片（默认态） ── */
    .cards-img {
      width: 100%;
      display: block;
      margin-top: auto;
    }

    /* ── 超能卡片区 ── */
    .super-cards-wrap {
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 0;
      margin-top: auto;
      padding-bottom: 30px;
    }
    .super-cards-wrap.visible { display: flex; }

    .super-cards-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,.45);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .super-cards-label svg { opacity: .6; }

    .super-cards-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
    }

    .super-card {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity .45s ease, transform .45s ease;
      cursor: pointer;
      flex: 1;
    }
    .super-card.show {
      opacity: 1;
      transform: translateY(0);
    }
    .super-card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 14px;
    }
    /* ══ 双屏视图 ══ */
    .dual-view {
      display: none;
      position: fixed;
      left: 80px;
      top: 55px;
      right: 0;
      bottom: 0;
      z-index: 20;
    }
    .dual-view.active {
      display: flex;
      pointer-events: all;
      animation: dualOpen .42s cubic-bezier(.22,.8,.36,1) forwards;
    }
    @keyframes dualOpen {
      0%   { opacity: 0; clip-path: inset(0 100% 0 0 round 0px); }
      100% { opacity: 1; clip-path: inset(0 0% 0 0 round 0px); }
    }

    /* 左侧从左推入 */
    .dual-left {
      width: 420px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,.08);
      transform: translateX(-32px);
      opacity: 0;
      animation: none;
    }
    .dual-view.active .dual-left {
      animation: slideInLeft .48s cubic-bezier(.22,.8,.36,1) .05s forwards;
    }
    @keyframes slideInLeft {
      to { transform: translateX(0); opacity: 1; }
    }

    /* 右侧从右推入 */
    .dual-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateX(32px);
      opacity: 0;
    }
    .dual-view.active .dual-right {
      animation: slideInRight .48s cubic-bezier(.22,.8,.36,1) .08s forwards;
    }
    @keyframes slideInRight {
      to { transform: translateX(0); opacity: 1; }
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-messages::-webkit-scrollbar { display: none; }

    /* 用户气泡 */
    .bubble-user {
      align-self: flex-end;
      max-width: 88%;
      background: rgba(255,255,255,.12);
      border: none;
      border-radius: 14px 4px 14px 14px;
      padding: 10px 16px;
      min-height: 46px;
      display: flex;
      align-items: center;
      color: rgba(255,255,255,.88);
      font-size: 14px;
      line-height: 26px;
    }

    /* ── AI 链路样式 ── */
    .bubble-ai {
      align-self: flex-start;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* 深度思考 / 画布操作 等元信息行 */
    .chain-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12.5px;
      color: rgba(255,255,255,.32);
      padding: 5px 0;
      cursor: default;
    }
    .chain-meta svg { flex-shrink: 0; opacity: .7; }
    .chain-meta.step { color: rgba(255,255,255,.38); }
    .chain-meta.canvas { color: rgba(255,255,255,.38); }

    /* 正文段落 */
    .chain-text {
      font-size: 14px;
      color: rgba(255,255,255,.82);
      line-height: 1.75;
      padding: 6px 0 10px;
    }
    /* 深度思考流光效果 —— 柔和扫光 */
    .chain-meta.think {
      color: rgba(255,255,255,.32);
    }
    .chain-meta.think.shimmering {
      background: linear-gradient(
        100deg,
        rgba(255,255,255,.28) 0%,
        rgba(255,255,255,.34) 30%,
        rgba(255,255,255,.72) 45%,
        rgba(255,255,255,.86) 50%,
        rgba(255,255,255,.72) 55%,
        rgba(255,255,255,.34) 70%,
        rgba(255,255,255,.28) 100%
      );
      background-size: 260% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textShimmer 3.6s cubic-bezier(.42,0,.18,1) infinite;
      will-change: background-position;
    }
    .chain-meta.think.shimmering svg {
      opacity: .44;
      flex-shrink: 0;
    }
    @keyframes textShimmer {
      0%   { background-position: 150% 0; }
      68%  { background-position: -70% 0; }
      100% { background-position: -70% 0; }
    }
    .chain-code {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      color: rgba(255,255,255,.55);
      font-family: 'SF Mono', 'Menlo', monospace;
      line-height: 1.7;
      margin: 4px 0 10px;
    }

    /* 操作按钮行 */
    .bubble-actions {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
      padding: 4px 0 8px;
    }
    .bubble-action-btn {
      color: rgba(255,255,255,.25);
      cursor: pointer;
      transition: color .15s;
      display: flex;
      flex-shrink: 0;
    }
    .bubble-action-btn:hover { color: rgba(255,255,255,.6); }

    /* 双屏输入框 */
    .dual-input-wrap {
      padding: 12px 16px 16px;
      flex-shrink: 0;
    }
    .dual-input-glow {
      border-radius: 16px;
      padding: 1.5px;
      background: linear-gradient(125deg,#8AD8FF 0%,#62E0FF 25%,#00AAFF 50%,#8AD8FF 75%,#62E0FF 100%);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      box-shadow: 0 0 20px rgba(0,136,255,.45), 0 0 50px rgba(0,136,255,.2);
    }
    .dual-input-inner {
      background: #111214;
      border-radius: 15px;
      padding: 14px 16px 10px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .dual-input-field {
      background: transparent;
      border: none;
      outline: none;
      color: rgba(255,255,255,.85);
      font-size: 14px;
      line-height: 1.6;
      width: 100%;
      resize: none;
      font-family: inherit;
      flex: 1;
      min-height: 48px;
    }
    .dual-input-field::placeholder { color: rgba(255,255,255,.28); }
    .dual-input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    /* 双屏关闭动画 */
    .dual-view.closing {
      animation: dualClose .32s cubic-bezier(.4,0,.6,1) forwards;
    }
    @keyframes dualClose {
      to { opacity: 0; clip-path: inset(0 100% 0 0 round 0px); }
    }

    /* 右侧结果区 */
    .dual-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateX(32px);
      opacity: 0;
    }
    .dual-view.active .dual-right {
      animation: slideInRight .48s cubic-bezier(.22,.8,.36,1) .08s forwards;
    }
    @keyframes slideInRight {
      to { transform: translateX(0); opacity: 1; }
    }

    .result-tabs {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 0 16px;
      height: 44px;
      border-bottom: 1px solid rgba(255,255,255,.07);
      flex-shrink: 0;
    }
    .result-tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: rgba(255,255,255,.4);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .result-tab:hover { color: rgba(255,255,255,.7); }
    .result-tab.active {
      color: #fff;
      background: rgba(255,255,255,.07);
    }
    .result-tab-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .close-tag {
      font-size: 12px;
      color: rgba(255,255,255,.4);
      cursor: pointer;
    }
    .close-tag:hover { color: rgba(255,255,255,.7); }

    .result-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }
    .result-body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,.10) 1.2px, transparent 1.4px) 0 0 / 32px 32px;
      pointer-events: none;
      z-index: 0;
    }
    .result-body > * {
      position: relative;
      z-index: 1;
    }
    .result-body::-webkit-scrollbar { display: none; }

    .result-thinking {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .thinking-line {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(255,255,255,.35);
    }
    .thinking-line svg {
      animation: spin-slow 1.5s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin-slow { to { transform: rotate(360deg); } }

    .result-canvas {
      flex: 1;
      border-radius: 14px;
      background: #111214;
      border: 1px solid rgba(255,255,255,.07);
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.15);
      font-size: 13px;
      position: relative;
      overflow: hidden;
    }
    /* loading 视频居中 —— 缩小 20% */
    #canvas-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #canvas-loading video {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    .canvas-panel {
      position: absolute;
      inset: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }
    .canvas-panel::-webkit-scrollbar { display: none; }

    /* 底部工具栏 */
    .canvas-toolbar {
      flex-shrink: 0;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .canvas-toolbar-img {
      width: min(838px, 80%);
      height: 61px;
      object-fit: contain;
      display: block;
    }

    /* 计划条目 */
    .plan-item { font-size: 13px; color: rgba(255,255,255,.4); padding: 4px 0; }
    .plan-item.done { color: rgba(74,222,128,.7); }

    /* ── 设计文件面板 ── */
    .df-wrap {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: #0f1117;
      border-radius: 14px;
      overflow: hidden;
      font-family: 'SF Mono','Menlo','Consolas',monospace;
      font-size: 12px;
    }
    .df-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,.07);
      flex-shrink: 0;
    }
    .df-header-left { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,.6); font-size: 12px; }
    .df-badge { font-size: 10px; color: rgba(255,255,255,.3); background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px; }
    .df-header-right { font-size: 11px; color: rgba(99,102,241,.8); cursor: pointer; }
    .df-body { flex: 1; display: flex; overflow: hidden; }
    /* 左侧文件树 */
    .df-sidebar {
      width: 200px; flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,.07);
      display: flex; flex-direction: column;
    }
    .df-search {
      margin: 8px 8px 4px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px; color: rgba(255,255,255,.3);
      display: flex; align-items: center; gap: 6px;
    }
    .df-file-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .df-file-list::-webkit-scrollbar { display: none; }
    .df-file-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px;
      font-size: 11.5px; color: rgba(255,255,255,.45);
      cursor: pointer; gap: 6px;
    }
    .df-file-item:hover { background: rgba(255,255,255,.04); }
    .df-file-item.active {

  <script>
    /* ── 超能模式切换 ── */
    function toggleSuper(btn) {
      const isOn = btn.classList.toggle('on');
      btn.classList.toggle('off', !isOn);
      const glow = document.querySelector('.input-glow');
      glow.classList.toggle('active', isOn);
      const defaultCards = document.getElementById('cards-default');
      const superCards = document.getElementById('super-cards');
      if (isOn) {
        defaultCards.style.display = 'none';
        superCards.classList.add('visible');
        ['sc1','sc2','sc3'].forEach((id, i) => {
          const el = document.getElementById(id);
          el.classList.remove('show');
          setTimeout(() => el.classList.add('show'), 80 + i * 120);
        });
      } else {
        ['sc1','sc2','sc3'].forEach(id => document.getElementById(id).classList.remove('show'));
        setTimeout(() => {
          superCards.classList.remove('visible');
          defaultCards.style.display = 'block';
        }, 200);
      }
    }

    /* ── 首页发送 → 进入双屏 ── */
    function sendQuery() {
      const field = document.querySelector('.input-field');
      const text = field.value.trim();
      if (!text) return;

      document.body.classList.add('dual-mode');
      document.getElementById('home-view').style.display = 'none';
      const dualView = document.getElementById('dual-view');
      dualView.classList.add('active');

      addUserBubble(text);
      field.value = '';

      setTimeout(() => simulateAI(8), 400);
    }

    function addUserBubble(text) {
      const msgs = document.getElementById('chat-messages');

    function simulateAI(videoDuration) {
      const totalMs = (videoDuration || 8) * 1000;
      const msgs = document.getElementById('chat-messages');
      const ai = document.createElement('div');
      ai.className = 'bubble-ai';
      msgs.appendChild(ai);

      const ICON = {
        think: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9"/><path d="M21 3v9h-9"/></svg>`,
        step:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
        canvas:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`,
      };
      const metaEl = (t,l) => `<div class="chain-meta ${t}">${ICON[t]||ICON.think}${l}</div>`;
      const cvs    = (l)   => `<div class="chain-meta canvas">${ICON.canvas}${l}</div>`;

      // 打字机：插入空 div，然后逐字填充，返回 Promise
      function typeText(html, speedMs = 18) {
        return new Promise(resolve => {
          const div = document.createElement('div');
          div.className = 'chain-text';
          ai.appendChild(div);
          // 把 html 里的标签剥出来，逐字符输出（保留 <br> <strong> 等）
          const tmp = document.createElement('div');
          tmp.innerHTML = html;
          const full = tmp.innerHTML;
          let i = 0;
          // 逐字符输出，但跳过 HTML 标签整体输出
          function tick() {
            if (i >= full.length) { resolve(); return; }
            if (full[i] === '<') {
              const end = full.indexOf('>', i);
              if (end >= 0) { i = end + 1; div.innerHTML = full.slice(0, i); } else { i++; }
            } else {
              i++;
              div.innerHTML = full.slice(0, i);
            }
            msgs.scrollTop = msgs.scrollHeight;
            setTimeout(tick, speedMs);
          }
          tick();
        });
      }

      function addThink(label) {
        ai.insertAdjacentHTML('beforeend', metaEl('think', label));
        const el = ai.lastElementChild;
        el.classList.add('shimmering');
        return el;
      }
      function stopShimmer(el) { el.classList.remove('shimmering'); }

      // 按比例分配时间节点，共 20 步，深度思考停留更长
      // weights: think=9%, text/canvas/step=3%  (8 thinks × 9% + 12 others × 3% = 72%+36%=108% → normalize)
      const weights = [9,3,3, 9,3,3, 9,3,3, 9,3, 9,3, 9,3,3, 9,3,3, 9,7];
      const wSum = weights.reduce((a,b)=>a+b,0);
      const delays = [];
      let acc = 0;
      weights.forEach(w => { delays.push(Math.round(acc)); acc += (w/wSum) * totalMs * 0.96; });

        [delays[4],  async () => { stopShimmer(lastThink); await typeText('用户选择了直接执行。让我先读取自动选中的风格参考，然后开始实现。'); }],
        [delays[5],  async () => { ai.insertAdjacentHTML('beforeend', cvs('画布：读取设计素材')); }],
        [delays[6],  async () => { lastThink = addThink('深度思考'); }],
        [delays[7],  async () => { stopShimmer(lastThink); await typeText('已读取 Linear 风格参考。现在直接实现这个高保真智能家居中控大屏界面。'); }],
        [delays[8],  async () => { ai.insertAdjacentHTML('beforeend', metaEl('step','查看 1 个步骤')); }],
        [delays[9],  async () => { lastThink = addThink('深度思考'); }],
        [delays[10], async () => { stopShimmer(lastThink); ai.insertAdjacentHTML('beforeend', metaEl('step','查看 1 个步骤')); }],
        [delays[11], async () => { lastThink = addThink('深度思考'); }],
        [delays[12], async () => { stopShimmer(lastThink); await typeText('HTML 文件已创建。接下来运行 Canvas 设计质量检查。'); }],
        [delays[13], async () => { lastThink = addThink('深度思考'); }],
        [delays[14], async () => { stopShimmer(lastThink); ai.insertAdjacentHTML('beforeend', metaEl('step','查看 1 个步骤')); }],
        [delays[15], async () => { ai.insertAdjacentHTML('beforeend', cvs('画布质量检查')); }],
        [delays[16], async () => { lastThink = addThink('深度思考'); }],
        [delays[17], async () => { stopShimmer(lastThink); await typeText('Nudges 已设置。现在调用最终执行质量门控完成设计交付。'); }],
        [delays[18], async () => { ai.insertAdjacentHTML('beforeend', metaEl('step','查看 1 个步骤')); }],
        [delays[19], async () => {
          lastThink = addThink('深度思考');
          await new Promise(r => setTimeout(r, Math.round((weights[19]/wSum) * totalMs * 0.4)));
          stopShimmer(lastThink);

          await typeText(`<strong>智能家居中控大屏界面已设计完成，基于 Linear 风格的高保真深色主题仪表板。</strong><br><br>界面包含三大核心模块：<br><br><strong>环境看板</strong> — 四格数据卡片展示温度、湿度、PM2.5 和 CO₂ 浓度，底部配有 24 小时温湿度双曲线趋势图，带渐变填充和当前时刻标记。<br><br><strong>快捷场景</strong> — 六宫格场景卡片（回家、离家、睡眠、观影、起床、会客），支持点击切换激活状态，激活时带有品牌色光晕和图标渐变效果。<br><br><strong>安防监控</strong> — 四路监控实时画面（客厅、门廊、主卧、车库），每路带红色 REC 录制标识、实时时间戳和在线状态点，画面底层用 CSS 渐变模拟房间空间感。<br><br>顶部状态栏显示实时时钟、天气和系统状态；底部设备栏汇总网关、在线设备数和网络延迟。已配置 3 组 Nudge 控件，可在 Canvas 中快速切换暗色/亮色/深海主题、调整主强调色和圆角大小。`, 12);
