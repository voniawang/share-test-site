<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>联想天禧 AlphaGoal 世界杯AI大猜想</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- 核心 React 与 Babel 解析器 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @font-face {
            font-family: "TitleFont";
            src: local("Barlow Condensed SemiBold"), local("Barlow Condensed Bold"), local("Barlow Condensed Medium"), local("BarlowCondensed-SemiBold"), local("BarlowCondensed-Bold"), local("BarlowCondensed-Medium"), local("Barlow Condensed");
            unicode-range: U+0030-0039, U+002B, U+002D, U+002E, U+002C, U+0025, U+002F, U+003A;
            font-weight: 100 900;
            font-display: swap;
        }
        @font-face {
            font-family: "TitleFont";
            src: local("HYQiHei-60S"), local("HYQiHei 60S"), local("汉仪旗黑-60S"), local("HYQiHei"), local("汉仪旗黑");
            unicode-range: U+0041-005A, U+0061-007A, U+4E00-9FFF, U+3000-303F, U+FF00-FFEF, U+0020-002A, U+002F, U+003B-0040, U+005B-0060, U+007B-007F;
            font-weight: 100 900;
            font-display: swap;
        }
        :root{
            --bg:#03050a;
            --bg-soft:#09111f;
            --panel:rgba(255,255,255,0.075);
            --panel-strong:rgba(255,255,255,0.14);
            --panel-solid:#0a101e;
            --panel-deep:#050914;
            --line:rgba(255,255,255,0.1);
            --line-strong:rgba(0,255,255,0.26);
            --text:#f5f5f6;
            --text-secondary:rgba(232,241,255,0.84);
            --text-muted:rgba(138,153,184,0.82);
            --ai:#0047ff;
            --ai-soft:#4dc3ff;
            --human:#ff004d;
            --human-soft:#ff6b97;
            --gold:#00ffff;
            --lime:#d4ff72;
            --shadow:0 18px 44px rgba(0,0,0,0.68);
            --shadow-soft:0 12px 28px rgba(0,0,0,0.42);
            --radius-xl:36px;
            --radius-lg:24px;
            --radius-md:18px;
        }

        *,*::before,*::after{ box-sizing:border-box; }
        html { scroll-behavior: smooth; }
        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            color: var(--text);
            font-family: "Helvetica Neue", "Inter", "PingFang SC", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            background:
                radial-gradient(circle at 50% -6%, rgba(0,71,255,0.24), transparent 26%),
                radial-gradient(circle at 20% 8%, rgba(77,195,255,0.08), transparent 18%),
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(180deg, #03050a 0%, #050914 48%, #02040a 100%);
            background-size:auto,auto,30px 30px,30px 30px,auto;
            background-position:center top,0 0,center top,center top,0 0;
            position: relative;
            overflow-x: hidden;
        }
        body::before{
            content:"";
            position:fixed;
            inset:0;
            pointer-events:none;
            background:
                radial-gradient(circle at -12% -14%, rgba(255, 0, 77, 0.32), rgba(255, 0, 77, 0.18) 18%, rgba(255, 0, 77, 0.08) 34%, transparent 54%),
                radial-gradient(circle at 112% 114%, rgba(77, 195, 255, 0.3), rgba(77, 195, 255, 0.16) 20%, rgba(77, 195, 255, 0.08) 36%, transparent 56%),
                radial-gradient(circle at 50% 0%, rgba(0,71,255,0.18), transparent 34%),
                linear-gradient(180deg, rgba(3,5,10,0), rgba(3,5,10,0.18) 40%, rgba(3,5,10,0.66) 100%);
            clip-path:none;
            opacity:1;
            filter:blur(54px);
        }
        body::after{
            content:"";
            position:fixed;
            inset:0;
            pointer-events:none;
            background:
                radial-gradient(circle at 50% -10%, rgba(77,195,255,0.12), transparent 22%),
                linear-gradient(180deg,rgba(255,255,255,0.02),transparent 20%,transparent 80%,rgba(0,0,0,0.24)),
                repeating-linear-gradient(118deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 34px),
                linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px),
                linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px);
            background-size:100% 100%,100% 100%,100% 100%,88px 88px,88px 88px;
            mask-image:linear-gradient(180deg,rgba(0,0,0,0.82),transparent 94%);
            opacity:.12;
            filter:blur(6px);
        }

        .page-shell{
            position:relative;
            z-index:1;
            width:100%;
            min-height:100vh;
        }
        .page-shell::before{
            content:"";
            position:fixed;
            inset:-12% -10% auto;
            height:44vh;
            pointer-events:none;
            background:
                radial-gradient(circle at 50% 0%, rgba(77,195,255,0.1), transparent 42%),
                linear-gradient(120deg, transparent 0 36%, rgba(255,255,255,0.03) 44%, transparent 52%, transparent 100%);
            opacity:.2;
            filter:blur(28px);
            transform:translateY(-16px);
        }
        .page-shell,
        .workspace-shell,
        .app-container,
        .pc-header-shell,
        .mobile-header-shell,
        .sidebar-panel,
        .desktop-card,
        .battle-header-shell,
        .battle-header-shell > .battle-hero-card,
        .battle-plot-wrap,
        .battle-plot-head,
        .battle-plot-area,
        .battle-plot-axis,
        .battle-plot-canvas,
        .battle-plot-status-row,
        .battle-plot-label-row,
        .filter-shell,
        .play-module-shell,
        .match-card-shell,
        .group-stage-shell,
        .knockout-stage-shell{
            transition:
                width 320ms cubic-bezier(0.22, 1, 0.36, 1),
                min-width 320ms cubic-bezier(0.22, 1, 0.36, 1),
                max-width 320ms cubic-bezier(0.22, 1, 0.36, 1),
                height 320ms cubic-bezier(0.22, 1, 0.36, 1),
                min-height 320ms cubic-bezier(0.22, 1, 0.36, 1),
                padding 320ms cubic-bezier(0.22, 1, 0.36, 1),
                margin 320ms cubic-bezier(0.22, 1, 0.36, 1),
                gap 320ms cubic-bezier(0.22, 1, 0.36, 1),
                inset 320ms cubic-bezier(0.22, 1, 0.36, 1),
                top 320ms cubic-bezier(0.22, 1, 0.36, 1),
                border-radius 320ms cubic-bezier(0.22, 1, 0.36, 1),
                background 360ms cubic-bezier(0.22, 1, 0.36, 1),
                background-color 360ms cubic-bezier(0.22, 1, 0.36, 1),
                border-color 320ms cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 360ms cubic-bezier(0.22, 1, 0.36, 1),
                opacity 220ms ease,
                transform 320ms cubic-bezier(0.22, 1, 0.36, 1),
                font-size 320ms cubic-bezier(0.22, 1, 0.36, 1),
                letter-spacing 320ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .workspace-shell{
            width:min(100%,420px);
            margin:0 auto;
        }
        .workspace-shell > *{
            align-self:stretch;
        }
        .app-container{
            width:100%;
            margin:0 auto;
            min-height:100vh;
            position:relative;
            overflow-x:hidden;
            background:transparent;
            box-shadow:none;
            border-left:none;
            border-right:none;
            display:flex;
            flex-direction:column;
        }
        .main-content-shell{
            border-radius:0;
        }
        .pc-header-shell,
        .mobile-header-shell,
        .sidebar-panel{
            display:none;
        }

        .pc-header-shell,
        .sidebar-panel,
        .battle-header-shell > .battle-hero-card,
        .match-card-shell,
        .group-stage-shell .group-summary-card,
        .knockout-stage-shell,
        .desktop-card{
            background:
                linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015)),
                linear-gradient(145deg, rgba(8,14,30,0.82), rgba(3,5,10,0.94));
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.06);
            backdrop-filter:blur(18px);
        }

        .desktop-card{
            border-radius:0;
            padding:22px 22px 20px;
            overflow:visible;
            background:transparent;
            border:none;
            box-shadow:none;
            backdrop-filter:none;
        }
        .desktop-card-title,
        .desktop-nav-btn span,
        .pc-header-title,
        .desktop-rank-name{
            font-family:"TitleFont","Barlow Condensed",sans-serif;
            letter-spacing:.04em;
        }
        .pc-header-shell{
            position:sticky;
            top:12px;
            z-index:200;
            width:min(1360px,calc(100% - 40px));
            margin:0 auto 20px;
            padding:18px 22px;
            align-items:center;
            justify-content:space-between;
            gap:20px;
            border-radius:999px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025)),
                linear-gradient(145deg, rgba(8,14,30,0.62), rgba(3,5,10,0.48));
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,0.08);
            backdrop-filter:blur(26px) saturate(1.08);
            -webkit-backdrop-filter:blur(26px) saturate(1.08);
        }
        .mobile-header-shell{
            position:sticky;
            top:12px;
            z-index:120;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
            margin:0 12px 14px;
            padding:12px 14px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025)),
                linear-gradient(145deg, rgba(8,14,30,0.68), rgba(3,5,10,0.54));
            border:1px solid rgba(255,255,255,0.08);
            border-radius:999px;
            backdrop-filter:blur(24px) saturate(1.06);
            -webkit-backdrop-filter:blur(24px) saturate(1.06);
            box-shadow:var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .mobile-header-brand,
        .mobile-header-meta,
        .mobile-header-actions{
            display:flex;
            align-items:center;
            gap:8px;
            min-width:0;
        }
        .mobile-header-brand{ flex:1; }
        .mobile-header-brand img{
            width:32px;
            height:32px;
        }
        .mobile-header-title{
            font-family:"TitleFont","Barlow Condensed",sans-serif;
            font-style:normal;
            font-weight:700;
            font-size:15px;
            line-height:.92;
            letter-spacing:0;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .mobile-header-sub{
            margin-top:2px;
            font-size:9px;
            color:var(--text-muted);
            letter-spacing:.16em;
            text-transform:uppercase;
            white-space:nowrap;
        }
        .mobile-profile-btn{
            padding:7px 10px;
            border-radius:999px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1);
            color:var(--text-secondary);
            font-size:10px;
            white-space:nowrap;
        }
        .mobile-profile-btn{
            display:flex;
            align-items:center;
            gap:6px;
            font-weight:700;
        }
        .brand-inline-group,
        .mobile-brand-inline{
            display:flex;
            align-items:center;
            gap:8px;
            color:var(--text-secondary);
            white-space:nowrap;
        }
        .brand-inline-item{
            display:flex;
            align-items:center;
            gap:6px;
            font-size:12px;
            font-weight:700;
            color:var(--text-secondary);
        }
        .brand-inline-item img{
            width:14px;
            height:14px;
            object-fit:contain;
            border-radius:3px;
            flex-shrink:0;
        }
        .brand-inline-divider{
            color:rgba(245,245,246,0.32);
            font-size:12px;
        }
        .mobile-brand-inline .brand-inline-item{
            font-size:10px;
        }
        .mobile-brand-inline .brand-inline-item img{
            width:12px;
            height:12px;
        }
        .pc-header-brand,
        .pc-header-nav,
        .pc-header-actions{
            display:flex;
            align-items:center;
            gap:12px;
        }
        .pc-header-brand img{
            border:none !important;
            border-radius:0 !important;
            box-shadow:none !important;
            background:transparent !important;
        }
        .pc-header-title{
            font-family:"TitleFont","Bebas Neue","Barlow Condensed",sans-serif;
            font-style:normal;
            font-weight:700;
            font-size:24px;
            line-height:.92;
            letter-spacing:.05em;
        }
        .pc-header-sub{
            font-size:10px;
            color:var(--ai-soft);
            letter-spacing:.18em;
            text-transform:uppercase;
            margin-top:2px;
        }
        .desktop-nav-btn{
            padding:8px 14px;
            border-radius:999px;
            border:1px solid var(--line);
            background:rgba(255,255,255,.03);
            color:var(--text-secondary);
            font-size:12px;
            font-weight:600;
            transition:all .2s ease;
        }
        .desktop-nav-btn.active{
            background:linear-gradient(135deg, rgba(0,255,255,0.16), rgba(0,71,255,0.2));
            border-color:rgba(0,255,255,.28);
            color:#f8fbff;
            box-shadow:0 0 22px rgba(0,255,255,0.14), inset 0 1px 0 rgba(255,255,255,.08);
        }
        .desktop-chip{
            padding:6px 10px;
            border-radius:999px;
            border:1px solid rgba(255,255,255,.08);
            background:rgba(255,255,255,.04);
            font-size:10px;
            color:var(--text-secondary);
            white-space:nowrap;
        }
        .desktop-rank-list{
            display:flex;
            flex-direction:column;
            gap:10px;
        }
        .desktop-rank-item{
            display:flex;
            align-items:center;
            gap:10px;
            padding:12px 0;
            border-radius:0;
            background:transparent;
            border:none;
            border-bottom:1px solid rgba(255,255,255,.08);
        }
        .desktop-rank-list .desktop-rank-item:last-child{ border-bottom:none; }
        .desktop-rank-index{
            width:24px;
            text-align:center;
            color:var(--text-muted);
            font-family:"TitleFont","Barlow Condensed",sans-serif;
            font-size:18px;
        }
        .desktop-rank-name{
            flex:1;
            font-size:16px;
            color:var(--text);
        }
        .desktop-rank-metric{
            font-size:12px;
            color:var(--text-secondary);
            white-space:nowrap;
        }
        .desktop-side-stats{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:10px;
        }
        .desktop-overview-head{
            display:block;
            margin-bottom:14px;
        }
        .desktop-overview-kicker{
            font-size:10px;
            color:var(--text-muted);
            letter-spacing:.16em;
            text-transform:uppercase;
            margin-bottom:4px;
        }
        .desktop-overview-title{
            font-family:"TitleFont","Bebas Neue","Barlow Condensed",sans-serif;
            font-style:normal;
            font-weight:700;
            font-size:24px;
            line-height:.92;
            letter-spacing:.05em;
            color:var(--text);
        }
        .desktop-overview-meta{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            margin-top:14px;
            padding-top:0;
            border-top:none;
        }
        .desktop-overview-section{
            margin-top:14px;
            padding-top:6px;
            border-top:none;
        }
        .desktop-mini-tags{
            display:flex;
            gap:8px;
            flex-wrap:wrap;
            margin-top:12px;
        }
        .desktop-mini-tag{
            padding:4px 8px;
            border-radius:999px;
            font-size:10px;
            color:var(--text-muted);
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.1);
            white-space:nowrap;
        }
        .desktop-side-stat{
            padding:10px 0 0;
            border-radius:0;
            background:transparent;
            border:none;
        }
        .desktop-side-stat-label{
            font-size:10px;
            color:var(--text-muted);
            text-transform:uppercase;
            letter-spacing:.12em;
        }
        .desktop-side-stat-value{
            margin-top:6px;
            font-family:"TitleFont","Barlow Condensed",sans-serif;
            font-size:28px;
            line-height:.9;
            color:var(--text);
        }
        .desktop-schedule-list{
            display:flex;
            flex-direction:column;
            gap:10px;
        }
        .desktop-schedule-item{
            display:grid;
            grid-template-columns:56px minmax(0,1fr) auto;
            gap:10px;
            align-items:center;
            padding:12px 0;
            border-radius:0;
            background:transparent;
            border:none;
            border-bottom:1px solid rgba(255,255,255,.08);
        }
        .desktop-schedule-list .desktop-schedule-item:last-child{ border-bottom:none; }
        .desktop-schedule-time{
            font-size:12px;
            color:var(--gold);
            font-family:"TitleFont","Barlow Condensed",sans-serif;
            letter-spacing:.06em;
        }
        .desktop-schedule-match{
            font-size:13px;
            color:var(--text-secondary);
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .battle-plot-wrap{
            margin-top:6px;
            padding:6px 0 0;
        }
        .battle-plot-head{
            display:block;
            margin-bottom:8px;
        }
        .battle-plot-title{
            font-size:12px;
            color:var(--text-secondary);
            letter-spacing:.12em;
            text-transform:uppercase;
            font-weight:700;
        }
        .battle-plot-subtitle{
            margin-top:4px;
            font-size:11px;
            color:var(--text-muted);
        }
        .battle-plot-area{
            display:flex;
            flex-direction:column;
            gap:14px;
        }
        .battle-plot-canvas{
            position:relative;
            padding:14px 16px 10px;
            border:none;
            border-radius:24px;
            background:transparent;
        }
        .battle-bar-scale{
            display:grid;
            grid-template-columns:repeat(6,1fr);
            padding-left:126px;
            padding-right:130px;
            margin-top:6px;
            font-size:10px;
            color:rgba(245,245,246,0.3);
        }
        .battle-bar-scale span{
            text-align:right;
        }
        .battle-bar-grid{
            display:flex;
            flex-direction:column;
            gap:12px;
        }
        .battle-bar-row{
            display:flex;
            align-items:center;
            gap:10px;
        }
        .battle-bar-label{
            width:112px;
            flex-shrink:0;
            display:flex;
            flex-direction:column;
            justify-content:center;
            gap:3px;
        }
        .battle-bar-kicker{
            font-size:10px;
            letter-spacing:.14em;
            text-transform:uppercase;
            color:var(--text-muted);
        }
        .battle-bar-name{
            font-family:"TitleFont","Barlow Condensed",sans-serif;
            font-style:normal;
            font-weight:700;
            font-size:24px;
            line-height:.9;
            color:var(--text);
            text-transform:uppercase;
        }
        .battle-bar-row.ai-row .battle-bar-label{
            transform:translateY(-6px);
        }
        .battle-bar-row.human-row .battle-bar-label{
            transform:translateY(-6px);
        }
        .battle-bar-track{
            position:relative;
            flex:1;
            height:14px;
            border-radius:999px;
            background:linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.015));
            overflow:hidden;
            box-shadow:inset 0 1px 0 rgba(255,255,255,0.05), inset 0 0 0 1px rgba(255,255,255,0.02);
        }
        .battle-bar-track::before{
            content:"";
            position:absolute;
            inset:0;
            background:linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size:20% 100%;
            opacity:.42;
            pointer-events:none;
        }
        .battle-bar-fill{
            position:absolute;
            inset:0 auto 0 0;
            border-radius:999px;
        }
        .battle-bar-fill.ai{
            background:linear-gradient(90deg, rgba(0,71,255,0.95), rgba(77,195,255,0.88));
            box-shadow:0 0 18px rgba(77,195,255,0.22);
        }
        .battle-bar-fill.human{
            background:linear-gradient(90deg, rgba(128,0,32,0.98), rgba(255,0,77,0.92));
            box-shadow:0 0 18px rgba(255,0,77,0.22);
        }
        .battle-bar-value{
            width:120px;
            flex-shrink:0;
            text-align:right;
            font-family:"TitleFont","Barlow Condensed",sans-serif;
            font-size:24px;
            line-height:.9;
            color:var(--text);
            display:flex;
            align-items:center;
            justify-content:flex-end;
            gap:8px;
            white-space:nowrap;
        }
        .battle-bar-value strong{
            font-weight:700;
            letter-spacing:.01em;
        }
        .battle-bar-value span{
            font-size:15px;
            line-height:1;
            color:var(--text-secondary);
        }
        .battle-plot-status-row{
            display:none;
        }
        .battle-plot-svg,
        .battle-plot-line.ai,
        .battle-plot-line.human,
        .battle-plot-fill.ai,
        .battle-plot-fill.human,
        .battle-plot-axis,
        .battle-plot-label-row{
            display:none;
        }
        .battle-plot-legend{
            display:flex;
            align-items:center;

        const BattleWaveCanvas = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                if (!mountRef.current || !window.THREE) return;

                const container = mountRef.current;
                const THREE_NS = window.THREE;
                const scene = new THREE_NS.Scene();
                const camera = new THREE_NS.PerspectiveCamera(60, 1, 0.1, 1000);
                camera.position.z = 68;
                camera.position.x = 14;

                const renderer = new THREE_NS.WebGLRenderer({
                    antialias: true,
                    alpha: true
                });
                renderer.setClearColor(0x000000, 0);
                container.appendChild(renderer.domElement);

                const gridSizeX = 138;
                const gridSizeY = 64;
                const spacing = 1.16;
                const particleCount = gridSizeX * gridSizeY;

                const positions = new Float32Array(particleCount * 3);
                const basePositions = new Float32Array(particleCount * 3);

                let i = 0;
                for (let ix = 0; ix < gridSizeX; ix++) {
                    for (let iy = 0; iy < gridSizeY; iy++) {
                        const x = (ix - gridSizeX / 2) * spacing;
                        const y = (iy - gridSizeY / 2) * spacing;
                        const z = 0;

                        positions[i] = x;
                        positions[i + 1] = y;
                        positions[i + 2] = z;

                        basePositions[i] = x;
                        basePositions[i + 1] = y;
                        basePositions[i + 2] = z;

                        i += 3;
                    }
                }

                const geometry = new THREE_NS.BufferGeometry();
                geometry.setAttribute('position', new THREE_NS.BufferAttribute(positions, 3));
                geometry.setAttribute('basePosition', new THREE_NS.BufferAttribute(basePositions, 3));

                const material = new THREE_NS.ShaderMaterial({
                    uniforms: {
                        uTime: { value: 0.0 },
                        uColor: { value: new THREE_NS.Color('#f4f8ff') }
                    },
                    vertexShader: `
                        uniform float uTime;
                        attribute vec3 basePosition;
                        varying float vZ;

                        void main() {
                            vec3 pos = basePosition;
                            float t = uTime * 1.18;

                            pos.z =
                                sin(pos.x * 0.095 + t) * 5.8 +
                                cos(pos.y * 0.11 + t * 0.92) * 3.7 +
                                sin((pos.x + pos.y) * 0.075 - t * 0.48) * 2.6;

                            vZ = pos.z;
                            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                            gl_PointSize = 1.95 * (100.0 / -mvPosition.z);
                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 uColor;
                        varying float vZ;

                        void main() {
                            vec2 circCoord = 2.0 * gl_PointCoord - 1.0;
                            if (dot(circCoord, circCoord) > 1.0) {
                                discard;
                            }

                            float depthOpacity = smoothstep(-9.0, 9.0, vZ);
                            float finalOpacity = 0.08 + (depthOpacity * 0.54);
                            gl_FragColor = vec4(uColor, finalOpacity);
                        }
                    `,
                    transparent: true,
                    depthWrite: false
                });

                const particles = new THREE_NS.Points(geometry, material);
                particles.rotation.x = -0.12;
                scene.add(particles);

                let frameId = 0;
                const clock = new THREE_NS.Clock();
                const resize = () => {
                    const width = container.clientWidth || 1;
                    const height = container.clientHeight || 1;
                    camera.aspect = width / height;
                    camera.updateProjectionMatrix();
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.8));
                    renderer.setSize(width, height, false);
                };

                resize();

                const observer = new ResizeObserver(() => resize());
                observer.observe(container);

                const animate = () => {
                    frameId = window.requestAnimationFrame(animate);
                    const elapsedTime = clock.getElapsedTime();
                    material.uniforms.uTime.value = elapsedTime;

                    camera.position.x = 14 + Math.sin(elapsedTime * 0.24) * 3.8;
                    camera.position.y = Math.cos(elapsedTime * 0.17) * 2.6;
                    camera.lookAt(14, 0, 0);

                    renderer.render(scene, camera);
                };

                animate();

                return () => {
                    window.cancelAnimationFrame(frameId);
                    observer.disconnect();
                    geometry.dispose();
                    material.dispose();
                    renderer.dispose();
                    if (renderer.domElement.parentNode === container) {
                        container.removeChild(renderer.domElement);
                    }
                };
            }, []);

            return <div ref={mountRef} className="battle-wave-webgl" />;
        };

                                            <div className="battle-bar-value">
                                                <strong>{humanDisplayRate}%</strong>
                                                <span>/ {humanWins}胜</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const FilterBar = ({ filterStatus, onFilterChange }) => (
            <div className="filter-shell sticky top-0 z-20 px-3 py-1.5 flex justify-between gap-2">
                <select className="flex-1 bg-gray-800 border border-gray-700 text-gray-300 text-[11px] rounded-lg px-2 py-1 focus:outline-none"><option>全部日期</option><option>07月06日</option></select>
                <select className="flex-1 bg-gray-800 border border-gray-700 text-gray-300 text-[11px] rounded-lg px-2 py-1 focus:outline-none"><option>全部球队</option><option>A-H组</option></select>
                <select className="flex-1 bg-gray-800 border border-gray-700 text-gray-300 text-[11px] rounded-lg px-2 py-1 focus:outline-none" value={filterStatus} onChange={(e) => onFilterChange(e.target.value)}>
                    <option value="预测中">预测中</option><option value="已截止">已截止</option><option value="全部状态">全部</option>
                </select>
            </div>
        );

        const MatchCard = ({ match, onAskAssistant, onShare }) => {
            const userOutcome = match.userRecord ? match.userRecord.outcome : null;
            const userScore = match.userRecord ? match.userRecord.score : null;

            const [selectedOutcome, setSelectedOutcome] = useState(userOutcome);
            const [selectedScore, setSelectedScore] = useState(userScore);
            const [isCustomizingScore, setIsCustomizingScore] = useState(false);
            const [customScore, setCustomScore] = useState({ a: 0, b: 0 });

            const isEnded = match.status === '已结束';
            const isOngoing = match.status === '进行中';
            const isClosedForBetting = isEnded || isOngoing || match.isBettingClosed;
            
            const [submitState, setSubmitState] = useState(match.userRecord ? (isClosedForBetting ? 2 : 1) : 0); 

            const handleSubmit = () => { if (submitState === 0) setSubmitState(1); else if (submitState === 1) setSubmitState(2); };
            const handleRevert = () => { if (submitState === 1 && !isClosedForBetting) { setSubmitState(0); setSelectedScore(null); setSelectedOutcome(null); setIsCustomizingScore(false); } };
            const handleOutcomeClick = (btnKey) => { if(submitState === 0 && !isClosedForBetting) { setSelectedOutcome(btnKey); setSelectedScore(null); setIsCustomizingScore(false); } };

            const openCustomScore = () => { let defaultA = 0; let defaultB = 0; if (selectedOutcome === 'win') defaultA = 1; if (selectedOutcome === 'lose') defaultB = 1; setCustomScore({ a: defaultA, b: defaultB }); setIsCustomizingScore(true); };
            const isCustomScoreValid = () => { if (selectedOutcome === 'win') return customScore.a > customScore.b; if (selectedOutcome === 'draw') return customScore.a === customScore.b; if (selectedOutcome === 'lose') return customScore.a < customScore.b; return false; };
            const confirmCustomScore = () => { if (isCustomScoreValid()) { setSelectedScore(`${customScore.a}:${customScore.b}`); setIsCustomizingScore(false); } };

            const isLocked = submitState === 2 || isClosedForBetting;

            const getBtnStyle = (btn) => {
                if (isEnded) {
                    if (match.actualOutcome === btn.key) return 'border-green-500/50 bg-green-900/20 text-green-400 shadow-sm ring-1 ring-green-500/50 z-10';
                    if (selectedOutcome === btn.key) return 'border-gray-700 bg-gray-800 text-gray-500 opacity-60';
                    return 'border-gray-800 bg-gray-900/50 text-gray-600 opacity-50';
                }
                if (selectedOutcome === btn.key) return isClosedForBetting ? `border-indigo-500/50 bg-indigo-900/40 text-indigo-300 shadow-sm opacity-90 z-10` : `border-indigo-500 bg-indigo-600/20 text-indigo-300 shadow-[0_0_15px_rgba(79,70,229,0.3)] transform scale-105 z-10`;
                return `border-gray-700 bg-gray-800 text-gray-400 ${isClosedForBetting ? 'opacity-70' : 'hover:bg-gray-700 hover:border-gray-600'}`;
            };

            const handleShareMatch = () => {
                onShare({ type: 'match', match: match, selectedOutcome: selectedOutcome, selectedScore: selectedScore, title: "预判了你的预判！", desc: "在这场万众瞩目的对决中，我已经锁定了我的预测！AI大模型们能赢过我吗？不服来辩！" });
            };

            const scorePicksArray = match.scorePicks[selectedOutcome] || [];
            const totalAIs = match.aiPicks.win.length + match.aiPicks.draw.length + match.aiPicks.lose.length || 8;
            const calcAiOdds = {
                win: Math.round((match.aiPicks.win.length / totalAIs) * 100),
                draw: Math.round((match.aiPicks.draw.length / totalAIs) * 100),
                lose: Math.round((match.aiPicks.lose.length / totalAIs) * 100)
            };

            return (
                <div className={`match-card-shell bg-[#111827] mx-3 mt-3 mb-3 rounded-2xl border transition-all relative overflow-hidden shadow-[0_4px_20px_rgba(0,0,0,0.2)] ${submitState > 0 && !isClosedForBetting ? 'border-indigo-500/50 shadow-[0_0_15px_rgba(79,70,229,0.2)]' : 'border-gray-800'}`}>
                    {!isEnded && submitState === 1 && <div className="absolute top-8 right-4 z-30 stamp-anim border border-indigo-500/80 text-indigo-400 font-black px-2 py-0.5 text-[10px] rounded bg-indigo-900/40 pointer-events-none">已选择</div>}
                    {!isEnded && submitState === 2 && <div className="absolute top-8 right-4 z-30 stamp-anim border border-gray-600 text-gray-400 bg-gray-800/80 font-black px-2 py-0.5 text-[10px] rounded pointer-events-none">已锁定</div>}

                    <div className="flex justify-between items-center px-3 py-2 bg-[#1a2235] border-b border-gray-800 text-[10px]">
                        <span className={`font-medium flex items-center gap-1 ${isEnded ? 'text-gray-500' : 'text-gray-400'}`}>{isOngoing ? <span className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span> : null}{match.time} <span className="ml-1 opacity-60">| {match.status} {isOngoing ? '(已截止)' : ''}</span></span>
                        <div className="flex items-center gap-2">
                            <span className="text-gray-500">{match.totalParticipants} 参与</span>
                            <button onClick={() => onAskAssistant(match)} className="bg-gray-800 border border-gray-700 shadow-sm px-2 py-1 rounded-full text-[9px] text-indigo-400 font-bold flex items-center gap-1 z-20 hover:bg-gray-700 transition-all">问天禧</button>
                        </div>
                    </div>

                    <div className={`flex justify-between items-center p-3 pb-1.5 ${isEnded ? 'opacity-70 grayscale-[30%]' : ''}`}>
                        <div className="text-center w-1/3"><img src={match.teamA.flagUrl} alt={match.teamA.name} className="w-10 h-6 object-cover shadow-md mx-auto mb-1 rounded-[2px] border border-gray-700 opacity-90" /><div className="font-bold text-gray-200 text-xs">{match.teamA.name}</div></div>
                        <div className="w-1/3 text-center"><div className="text-[9px] text-gray-500 mb-0.5">{isEnded ? '最终比分' : isOngoing ? '当前比分' : '常规时间'}</div><div className={`text-xl font-black italic ${match.status === '未开赛' ? 'text-gray-400' : 'text-gray-100'}`}>{match.status === '未开赛' ? '0 : 0' : (match.actualScore || match.currentScore || '0 : 0')}</div></div>
                        <div className="text-center w-1/3"><img src={match.teamB.flagUrl} alt={match.teamB.name} className="w-10 h-6 object-cover shadow-md mx-auto mb-1 rounded-[2px] border border-gray-700 opacity-90" /><div className="font-bold text-gray-200 text-xs">{match.teamB.name}</div></div>
                    </div>

                    <div className={`p-3 pt-1.5 transition-opacity ${isClosedForBetting && !isEnded ? 'opacity-80 pointer-events-none' : ''} ${isEnded ? 'pointer-events-none' : ''}`}>
                        <div className="flex gap-1.5 relative mt-3">
                            {[{ key: 'win', label: `${match.teamA.name}胜`, oddsA: calcAiOdds.win, oddsH: match.humanOdds.win, ais: match.aiPicks.win, color: 'indigo' }, { key: 'draw', label: '平局', oddsA: calcAiOdds.draw, oddsH: match.humanOdds.draw, ais: match.aiPicks.draw, color: 'gray' }, { key: 'lose', label: `${match.teamB.name}胜`, oddsA: calcAiOdds.lose, oddsH: match.humanOdds.lose, ais: match.aiPicks.lose, color: 'indigo' }].map(btn => (
                                <button key={btn.key} onClick={() => handleOutcomeClick(btn.key)} className={`flex-1 pt-2.5 pb-1.5 rounded-lg font-bold border-[0.5px] transition-all relative flex flex-col items-center gap-0.5 ${getBtnStyle(btn)}`}>
                                    <div className="absolute -top-2.5 left-1/2 -translate-x-1/2 flex -space-x-1.5 z-20">
                                        {btn.ais.map((aiId, i) => {
                                            const ai = AI_MODELS.find(m => m.id === aiId);
                                            return (<span key={i} className={`bg-gray-800 rounded-full shadow-sm border border-gray-600 w-4 h-4 flex items-center justify-center overflow-hidden p-[1px] ${(selectedOutcome === btn.key && !isEnded) ? 'border-indigo-400' : ''}`}><AILogo src={ai ? ai.logo : null} fallback={ai ? ai.emojiFallback : null} className="w-full h-full" /></span>);
                                        })}
                                    </div>
                                    <span className="text-[13px] mt-0.5">{btn.label}</span>
                                    <div className="w-[84%] flex flex-col gap-0.5 mt-1 opacity-80">
                                        <div className="grid grid-cols-[36px_1fr_auto] items-center gap-1">
                                            <span className="text-[10px] text-gray-400 text-left">AI</span>
                                            <div className="h-1 rounded-full shadow-[0_0_8px_rgba(77,195,255,0.18)]" style={{width: `${btn.oddsA}%`, background: 'linear-gradient(90deg, #0047ff 0%, #4dc3ff 100%)'}}></div>
                                            <span className="text-[10px] text-[#8fdfff]">{btn.oddsA}%</span>
                                        </div>
                                        <div className="grid grid-cols-[36px_1fr_auto] items-center gap-1">
                                            <span className="text-[10px] text-gray-400 text-left">人类</span>
                                            <div className="h-1 rounded-full shadow-[0_0_8px_rgba(255,0,77,0.16)]" style={{width: `${btn.oddsH}%`, background: 'linear-gradient(90deg, #800020 0%, #ff004d 100%)'}}></div>
                                            <span className="text-[10px] text-[#ff8fb2]">{btn.oddsH}%</span>
                                        </div>
                                    </div>
                                    {isEnded && match.actualOutcome === btn.key && <div className="absolute -bottom-2 bg-green-600 text-white text-[8px] px-2 py-0.5 rounded-full z-30 shadow-sm whitespace-nowrap">👑 最终赛果</div>}
                                    {isEnded && selectedOutcome === btn.key && match.actualOutcome !== btn.key && <div className="absolute -bottom-2 bg-gray-600 text-gray-300 text-[8px] px-2 py-0.5 rounded-full z-30 shadow-sm whitespace-nowrap">❌ 猜错了</div>}
                                    {isEnded && selectedOutcome === btn.key && match.actualOutcome === btn.key && <div className="absolute -bottom-2 bg-green-500 text-white text-[8px] px-2 py-0.5 rounded-full z-30 shadow-[0_0_8px_rgba(34,197,94,0.5)] whitespace-nowrap ring-1 ring-green-400">✅ 猜中了</div>}
                                </button>
                            ))}
                        </div>
                    </div>

                    {!isClosedForBetting && selectedOutcome && submitState === 0 && (
                        <div className="p-3 border-t border-gray-800 bg-[#111827] fade-in">
                            {isCustomizingScore ? (
                                <div className="bg-gray-800/50 rounded-xl p-3 border border-gray-700 shadow-inner">
                                    <div className="flex justify-between items-center mb-4"><span className="text-xs font-bold text-gray-300">自定义比分录入</span><button onClick={() => setIsCustomizingScore(false)} className="text-[10px] text-gray-400 bg-gray-800 px-2.5 py-1 rounded-full border border-gray-700 hover:bg-gray-700 active:scale-95">返回默认</button></div>
                                    <div className="flex items-center justify-between px-2">
                                        <div className="flex flex-col items-center"><span className="text-[11px] font-bold text-gray-400 mb-2">{match.teamA.name}</span><div className="flex items-center gap-2 bg-gray-900 rounded-full p-1 border border-gray-700 shadow-inner"><button onClick={() => setCustomScore(p => ({...p, a: Math.max(0, p.a - 1)}))} className="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center text-gray-300 font-black hover:bg-gray-700 active:scale-95 text-lg">-</button><span className="w-6 text-center font-black text-xl text-indigo-400">{customScore.a}</span><button onClick={() => setCustomScore(p => ({...p, a: p.a + 1}))} className="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center text-gray-300 font-black hover:bg-gray-700 active:scale-95 text-lg">+</button></div></div>
                                        <span className="text-2xl font-black text-gray-600 mb-2">:</span>
                                        <div className="flex flex-col items-center"><span className="text-[11px] font-bold text-gray-400 mb-2">{match.teamB.name}</span><div className="flex items-center gap-2 bg-gray-900 rounded-full p-1 border border-gray-700 shadow-inner"><button onClick={() => setCustomScore(p => ({...p, b: Math.max(0, p.b - 1)}))} className="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center text-gray-300 font-black hover:bg-gray-700 active:scale-95 text-lg">-</button><span className="w-6 text-center font-black text-xl text-indigo-400">{customScore.b}</span><button onClick={() => setCustomScore(p => ({...p, b: p.b + 1}))} className="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center text-gray-300 font-black hover:bg-gray-700 active:scale-95 text-lg">+</button></div></div>
                                    </div>
                                    <div className="mt-3 text-center h-4 flex items-center justify-center">{!isCustomScoreValid() && <span className="text-[10px] text-red-400 flex items-center justify-center gap-1 font-medium bg-red-900/20 px-2 py-0.5 rounded border border-red-800/50">⚠️ 当前比分不符合【{selectedOutcome === 'win' ? `${match.teamA.name}胜` : selectedOutcome === 'lose' ? `${match.teamB.name}胜` : '平局'}】</span>}</div>
                                    <button disabled={!isCustomScoreValid()} onClick={confirmCustomScore} className={`w-full mt-2 py-2 rounded-xl font-bold text-xs transition-all ${isCustomScoreValid() ? 'bg-indigo-600 text-white shadow-[0_0_10px_rgba(79,70,229,0.3)] active:scale-95' : 'bg-gray-800 text-gray-600 cursor-not-allowed'}`}>确认录入该比分</button>
                                </div>
                            ) : (
                                <>
                                    <div className="mb-2 flex flex-col gap-0.5"><div className="text-xs font-bold text-gray-300">猜比分 <span className="text-gray-500 font-normal text-[10px] ml-1">(选填)</span></div><div className="text-[9px] text-gray-500">猜中胜负瓜分奖池，猜中比分赢抽奖资格</div></div>
                                    <div className="grid grid-cols-3 gap-2">
                                        {scorePicksArray.map((pick, index) => (
                                            <button key={index} onClick={() => setSelectedScore(pick.score)} className={`relative py-1.5 rounded-xl border flex flex-col items-center justify-center transition-all ${selectedScore === pick.score ? 'border-indigo-500 bg-indigo-500/20 shadow-[inset_0_0_10px_rgba(79,70,229,0.2)]' : 'border-gray-700 bg-gray-800 hover:bg-gray-700'}`}>
                                                <div className={`text-base font-black ${selectedScore === pick.score ? 'text-indigo-300' : 'text-gray-300'}`}>{pick.score}</div>
                                                <div className="flex gap-1 mt-0 min-h-[14px]">{pick.ais.map((aiId, i) => { const ai = AI_MODELS.find(m => m.id === aiId); return (<span key={i} className="opacity-80 w-3 h-3 rounded-full overflow-hidden flex items-center justify-center border border-gray-600"><AILogo src={ai ? ai.logo : null} fallback={ai ? ai.emojiFallback : null} className="w-full h-full grayscale" /></span>); })}</div>
                                            </button>
                                        ))}
                                        {selectedScore && !scorePicksArray.find(p => p.score === selectedScore) && <button className="relative py-1.5 rounded-xl border border-indigo-500 bg-indigo-500/20 shadow-[inset_0_0_10px_rgba(79,70,229,0.2)] flex flex-col items-center justify-center transition-all"><div className="text-base font-black text-indigo-300">{selectedScore}</div><div className="flex gap-1 mt-0 min-h-[14px] items-center justify-center"><span className="text-[8px] text-indigo-400 font-bold bg-indigo-900/50 px-1 rounded-sm border border-indigo-500/30">自定义</span></div></button>}
                                        <button onClick={openCustomScore} className="relative py-1.5 rounded-xl border border-gray-700 border-dashed text-gray-500 text-[10px] font-medium bg-gray-800/30 flex items-center justify-center hover:bg-gray-800 active:scale-95 transition-all">其他比分 &gt;</button>
                                    </div>
                                    <button onClick={handleSubmit} className={`w-full mt-3 font-bold py-2.5 rounded-xl active:scale-95 transition-all text-xs border ${selectedScore ? 'bg-indigo-600 text-white hover:bg-indigo-500 shadow-[0_0_15px_rgba(79,70,229,0.4)] border-indigo-500' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border-gray-700'}`}>{selectedScore ? '锁定比分 (获取抽奖资格)' : '仅猜胜负 (参与瓜分奖池)'}</button>
                                </>
                            )}
                        </div>
                    )}

                    {isEnded ? (
                        <div className={`p-2.5 border-t text-[10px] flex justify-between items-center ${(match.userRecord && match.userRecord.isHit) ? 'bg-green-900/20 border-green-800/50' : 'bg-gray-900 border-gray-800'}`}><div className="flex flex-col gap-0.5"><span className={`font-bold ${(match.userRecord && match.userRecord.isHit) ? 'text-green-400' : 'text-gray-400'}`}>{(match.userRecord && match.userRecord.isHit) ? '🎉 恭喜！成功猜中赛果' : '遗憾未中，下次好运！'}</span><span className="text-[9px] text-gray-500 font-medium">我的预测: {(match.userRecord && match.userRecord.predictionText) ? match.userRecord.predictionText : '未参与'}</span></div>{(match.userRecord && match.userRecord.isHit) && <span className="text-orange-400 font-bold bg-orange-900/40 border border-orange-700/50 px-1.5 py-0.5 rounded">奖池已发</span>}</div>
                    ) : isClosedForBetting ? (
                        <div className="p-2.5 bg-gray-800/50 border-t border-gray-800 flex justify-between items-center text-[10px]"><div className="flex flex-col gap-0.5"><span className="text-gray-400 font-bold flex items-center gap-1">🔒 竞猜已截止</span><span className="text-[9px] text-gray-500 font-medium">我的预测: {(match.userRecord && match.userRecord.predictionText) ? match.userRecord.predictionText : '未参与'}</span></div></div>
                    ) : submitState > 0 ? (
                        <div className="p-2.5 bg-indigo-900/20 border-t border-indigo-800/50 flex justify-between items-center text-[10px]">
                            <div className="flex flex-col gap-0.5">
                                <span className="text-indigo-400 font-medium flex items-center gap-1">{isLocked ? '🔒 预测已锁定，等待开奖' : '✅ 预测成功，静候佳音'}</span>
                                <span className="text-[9px] text-indigo-500/80 font-medium">已选: {selectedOutcome === 'win' ? match.teamA.name : selectedOutcome === 'lose' ? match.teamB.name : '平局'} {selectedOutcome !== 'draw' ? '胜' : ''} {selectedScore ? ` ${selectedScore}` : ' (未猜比分)'}</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={handleShareMatch} className="bg-indigo-600 border border-indigo-500 text-white px-2.5 py-1 rounded-full font-bold shadow-sm active:scale-95 transition-all hover:bg-indigo-500 whitespace-nowrap flex items-center gap-1">
                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>炫耀
                                </button>
                                {!isLocked && <button onClick={handleRevert} className="bg-gray-800 border border-gray-700 text-gray-300 px-2.5 py-1 rounded-full font-bold shadow-sm active:scale-95 transition-all hover:bg-gray-700 whitespace-nowrap">修改</button>}
                            </div>
                        </div>
                    ) : null}
                </div>
            );
        };

        const GroupStagePrediction = ({ onShare }) => {
            const [selectedTeams, setSelectedTeams] = useState([]);
            const [activeAIPick, setActiveAIPick] = useState(null);

            const toggleTeam = (teamName, groupId) => {
                if (activeAIPick) setActiveAIPick(null);
                const isSelected = selectedTeams.includes(teamName);
                if (isSelected) setSelectedTeams(selectedTeams.filter(t => t !== teamName));
                else {
                    const groupSelectedCount = GROUPS.find(g => g.id === groupId).teams.filter(t => selectedTeams.includes(t.name)).length;
                    if (groupSelectedCount >= 3 || selectedTeams.length >= 32) return;
                    setSelectedTeams([...selectedTeams, teamName]);
                }
            };

            const applyAIPick = (aiId) => { if (AI_GROUP_PICKS[aiId]) { setSelectedTeams(AI_GROUP_PICKS[aiId]); setActiveAIPick(aiId); } };

            const handleShareGroup = () => {
                const aiName = activeAIPick ? AI_MODELS.find(m => m.id === activeAIPick)?.name : '';
                onShare({ 
                    type: 'group', 
                    selectedTeams: selectedTeams, 
                    activeAIPick: activeAIPick, 
                    title: activeAIPick ? `我破译了【${aiName}】的战术名单！` : "这是我的 2026 世界杯32强", 
                    desc: activeAIPick ? `这套出线名单由AI大模型推演生成，看看你能否找到破绽？` : `根据48强最新规则，我亲自挑选了这套晋级组合，不服来战！` 
                });
            };

            return (
                <div className="group-stage-shell pb-28 fade-in">
                    <div className="bg-[#0B1120]/95 backdrop-blur-md border-b border-gray-800 pb-3 pt-1 sticky top-[48px] z-10 shadow-md">
                        <div className="px-4 text-xs font-bold text-gray-300 mb-2 flex items-center justify-between"><span>🤖 知己知彼：探查AI推演名单</span><span className="text-[10px] text-gray-500 font-normal">点击一键套用</span></div>
                        <div className="flex gap-2.5 overflow-x-auto no-scrollbar px-4 pb-1 items-center">
                            {AI_MODELS.map(ai => (
                                <button key={ai.id} onClick={() => applyAIPick(ai.id)} className={`flex items-center justify-center rounded-full border transition-all duration-300 flex-shrink-0 shadow-sm ${activeAIPick === ai.id ? 'px-3 py-1.5 bg-indigo-900/50 border-indigo-500 text-indigo-300 font-bold shadow-[0_0_10px_rgba(79,70,229,0.3)] gap-1.5' : 'w-8 h-8 bg-gray-800 border-gray-700 hover:bg-gray-700'}`}>
                                    <span className="w-5 h-5 rounded-full overflow-hidden flex items-center justify-center flex-shrink-0 p-[1px]">
                                        {/* 去除 grayscale 和 opacity-80，让大模型图标全彩点亮 */}
                                        <AILogo src={ai.logo} fallback={ai.emojiFallback} className="w-full h-full object-contain" />
                                    </span>
                                    {activeAIPick === ai.id && <span className="text-[11px] whitespace-nowrap fade-in">{ai.name}</span>}
                                </button>

                            <div>
                                <div className="mobile-header-title">天禧<span style={{fontFamily:'"HYQiHei-60S","HYQiHei","汉仪旗黑",sans-serif'}}>AI</span>世界杯竞猜</div>
                            </div>
                        </div>
                        <div className="mobile-header-meta">
                            <div className="mobile-brand-inline">
                                <div className="brand-inline-item">
                                    <img src="https://www.google.com/s2/favicons?domain=lenovo.com.cn&sz=64" alt="联想" />
                                    <span>联想</span>
                                </div>
                                <span className="brand-inline-divider">|</span>
                                <div className="brand-inline-item">
                                    <img src="https://www.google.com/s2/favicons?domain=miguvideo.com&sz=64" alt="咪咕" />
                                    <span>咪咕</span>
                                </div>
                            </div>
                        </div>
                        <div className="mobile-header-actions">
                            <button onClick={() => setShowProfile(true)} className="mobile-profile-btn">
                                <span className="bg-gradient-to-tr from-blue-500 to-indigo-500 rounded-full w-4 h-4 flex items-center justify-center text-[9px] text-white shadow-inner">👤</span>
                                <span>我的</span>
                            </button>
                        </div>
                    </div>

                    <div className="workspace-shell">
                        <aside className="sidebar-panel sidebar-left-shell">
                            <div className="desktop-card top-sync-card">
                                <div className="desktop-overview-head">
                                    <div>
                                        <div className="desktop-overview-title" style={{fontSize:'19px'}}>我的战绩</div>
                                    </div>
                                </div>
                                <div className="desktop-side-stats mt-3">
                                    <div className="desktop-side-stat">
                                        <div className="desktop-side-stat-label">参与场次</div>
                                        <div className="desktop-side-stat-value text-[var(--gold)]">{MY_STATS.totalPicks}</div>
                                    </div>
                                    <div className="desktop-side-stat">
                                        <div className="desktop-side-stat-label">当前胜率</div>
                                        <div className="desktop-side-stat-value text-[var(--gold)]">{MY_STATS.winRate}%</div>
                                    </div>
                                </div>
                                <div className="desktop-overview-section">
                                    <div className="desktop-side-stats mt-3">
                                        <div className="desktop-side-stat">
                                            <div className="desktop-side-stat-label">领先模型</div>
                                            <div className="desktop-side-stat-value text-[var(--gold)]">{topAiModels[0].winRate}%</div>
                                        </div>
                                        <div className="desktop-side-stat">
                                            <div className="desktop-side-stat-label">人类榜</div>
                                            <div className="desktop-side-stat-value text-[var(--gold)]">{MY_STATS.rank}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="desktop-card mt-4">
                                <div className="flex items-center justify-between gap-3">
                                    <div className="desktop-card-title text-[13px] uppercase text-white/75">AI榜 Top 3</div>
                                    <button onClick={() => setLeaderboardType('ai')} className="text-[11px] text-white/40 hover:text-white/70 transition-colors">查看</button>
                                </div>
                                <div className="desktop-rank-list mt-3">
                                    {topAiModels.map((item, index) => (
                                        <button key={item.id} onClick={() => setLeaderboardType('ai')} className="desktop-rank-item text-left">
                                            <div className="desktop-rank-index">{index + 1}</div>
                                            <span className="bg-white/5 w-8 h-8 rounded-full flex items-center justify-center overflow-hidden border border-white/10">
                                                <AILogo src={item.logo} fallback={item.emojiFallback} className="w-5 h-5" />
                                            </span>
                                            <div className="desktop-rank-name">{item.name}</div>
                                            <div className="desktop-rank-metric">{item.winRate}%</div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="desktop-card mt-4">
                                <div className="flex items-center justify-between gap-3">
                                    <div className="desktop-card-title text-[13px] uppercase text-white/75">人类榜 Top 3</div>
                                    <button onClick={() => setLeaderboardType('human')} className="text-[11px] text-white/40 hover:text-white/70 transition-colors">查看</button>
                                </div>
                                <div className="desktop-rank-list mt-3">
                                    {topHumans.map((item, index) => (
                                        <button key={item.id} onClick={() => setLeaderboardType('human')} className="desktop-rank-item text-left">
                                            <div className="desktop-rank-index">{index + 1}</div>
                                            <div className="w-8 h-8 rounded-full border border-white/10 bg-white/5 flex items-center justify-center text-sm">{item.avatar}</div>
                                            <div className="desktop-rank-name">{item.name}</div>
                                            <div className="desktop-rank-metric">{item.winRate}%</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </aside>

                        <div className="app-container main-content-shell pb-20">
                            <BattleHeader onOpenLeaderboard={setLeaderboardType} onOpenProfile={() => setShowProfile(true)} onShare={setShareData} />

                            <div className="play-module-shell">
                                <div ref={tabsRef} className="app-tab-strip flex px-3 py-1.5 gap-2">
                                    {tabs.map(tab => (
                                        <button 
                                            key={tab.id} 
                                            onClick={() => handleTabClick(tab.id)} 
                                            className={`app-tab-btn flex-1 py-2 rounded-xl text-[13px] font-bold flex items-center justify-center transition-all ${activeTab === tab.id ? 'is-active bg-indigo-600 text-white shadow-[0_0_15px_rgba(79,70,229,0.4)] transform scale-105 border border-indigo-500' : 'bg-gray-800 text-gray-400 border border-gray-700 hover:bg-gray-700'}`}
                                        >
                                            <span>{tab.label}</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="mt-1 relative">
                                    {activeTab === 'daily' && (
                                        <div className="fade-in">
                                            <FilterBar filterStatus={filterStatus} onFilterChange={setFilterStatus} />
                                            {filteredMatches.map(match => <MatchCard key={match.id} match={match} onAskAssistant={setActiveAssistantMatch} onShare={setShareData} />)}
                                        </div>
                                    )}
                                    
                                    {activeTab === 'group' && <GroupStagePrediction onShare={setShareData} />}
                                    {activeTab === 'knockout' && <KnockoutStagePrediction onShare={setShareData} />}
                                </div>
                            </div>
                        </div>

                        <aside className="sidebar-panel sidebar-right-shell">
                            <div className="desktop-card top-sync-card">
                                <div className="desktop-card-title text-[13px] uppercase text-white/75">赛程速览</div>
                                <div className="desktop-schedule-list mt-3">
                                    {desktopMatches.map(match => (
                                        <div key={match.id} className="desktop-schedule-item">
                                            <div className="desktop-schedule-time">{match.time.replace('今天 ', '').replace('明天 ', '').replace('后天 ', '').trim()}</div>
                                            <div className="desktop-schedule-match">{match.teamA.name} vs {match.teamB.name}</div>
                                            <div className="desktop-schedule-tag">{match.status}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </aside>
                    </div>

                    {leaderboardType && <LeaderboardModal type={leaderboardType} onClose={() => setLeaderboardType(null)} />}
                    {activeAssistantMatch && <TianxiAssistantModal match={activeAssistantMatch} onClose={() => setActiveAssistantMatch(null)} />}
                    {showProfile && <UserProfileModal onClose={() => setShowProfile(false)} />}
                    {shareData && <ShareModal shareData={shareData} onClose={() => setShareData(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
