<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天禧AI - 主页</title>
  <style>
    @font-face {
      font-family: "HYDaSongJ";
      src: url('assets/a-1e08d58ce3b2df55.ttf') format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "SongtiCustom";
      src:
        local("Songti SC Regular"),
        local("STSong");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 770px;
      overflow: hidden;
      background: #0b0b0c;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC',
                   'Microsoft YaHei', sans-serif;
    }
    body {
      position: relative;
      transform: translateZ(0);
      transform-origin: left top;
    }

    /* ── 全页背景（浏览器外壳截图） ── */
    .bg-shell {
      position: fixed;
      left: 0;
      top: 0;
      width: 1200px;
      height: 770px;
      background: url('assets/a-4f63398606f7bd4e.png') center / cover no-repeat;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    body.dual-mode .bg-shell {
      background-image: url('assets/a-8d23dfd2c13995e0.png');
    }
    body.dual-file-open .bg-shell {
      background-image: url('assets/a-e1a7d8b967740395.png');
    }
    .dual-title-shell {
      position: fixed;
      left: 0;
      top: 0;
      width: 1200px;
      height: 56px;
      z-index: 25;
      pointer-events: none;
      display: none;
      background: url('assets/a-1a75d93e383fd881.png') center top / 100% 56px no-repeat;
    }
    body.dual-file-open .dual-title-shell {
      display: block;
    }
    /* ── 内容区（覆盖在背景黑色大区域上）── */
    /* bg.png 中侧边栏约 80px，顶栏约 55px（按 2400x1540 原图） */
    .content-area {
      position: fixed;
      left: 261px;
      top: 53px;
      width: 939px;
      height: 717px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      overflow-y: auto;
    }
    .content-area::-webkit-scrollbar { display: none; }

    /* 宽度容器 */
    .content-inner {
      width: 939px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 92px;
    }

    /* ── 标题 ── */
    .hero-title {
      display: none;
      align-items: center;
      gap: 14px;
      margin-bottom: 56px;
    }
    .hero-logo {
      width: 46px;
      height: 46px;
      flex-shrink: 0;
      display: block;
      object-fit: contain;
    }
    body:not(.super-mode-active) .hero-logo {
      display: none;
    }
    .hero-copy {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hero-title-text {
      position: relative;
      display: inline-block;
      font-family: "SongtiCustom", "Songti SC", "PingFang SC", sans-serif;
      font-size: 30px;
      font-weight: 400;
      line-height: 40px;
      color: #16181d;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .hero-title-question,
    .heading-question {
      font-family: "HYDaSongJ", "Songti SC", serif;
      font-weight: 400;
      font-size: 30px;
      line-height: inherit;
    }
    .hero-super-desc {
      position: absolute;
      left: 0;
      top: calc(100% + 8px);
      max-width: 838px;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,.62);
      letter-spacing: 0;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }
    body.super-mode-active .hero-super-desc {
      opacity: 1;
    }
    .hero-title-text.super-copy {
      color: #fff;
      text-shadow: 0 0 18px rgba(98,224,255,.12);
    }
    .hero-title-text.title-sweep-once {
      color: transparent;
      background: linear-gradient(100deg, #fff 0%, #fff 38%, #8ad8ff 48%, #fff 58%, #fff 100%);
      background-size: 260% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleSweep .72s ease-out 1;
    }
    @keyframes titleSweep {
      0% { background-position: 130% 50%; }
      100% { background-position: -130% 50%; }
    }

    /* ── Tab 导航（图片） ── */
    .tab-bar {
      margin-bottom: 10px; /* Feature 图片距输入框 10px */
      margin-left: -20px;
    }
    body:not(.super-mode-active) .tab-bar {
      display: none;
    }
    .tab-bar img {
      width: 100%;
      height: auto;
      display: block;
    }
    body.super-mode-active .tab-bar {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    /* ── 输入框（彩虹光圈） ── */
    .input-wrap {
      width: 838px;
      max-width: none;
      position: fixed;
      left: auto;
      right: 51px;
      bottom: 21px;
      transform: none;
      z-index: 20000;
      margin-bottom: 0;
    }
    body.super-mode-active .input-wrap {
      width: 838px;
      left: auto;
      right: 51px;
      transform: none;
    }

    /* 输入框边框层 —— 默认快速态 */
    .input-glow {
      position: relative;
      isolation: isolate;
      box-sizing: border-box;
      overflow: visible;
      border-radius: 20px;
      padding: .5px;
      height: 108px;
      background: rgba(0, 0, 0, .12);
      background-size: 200% 200%;
      animation: none;
      box-shadow: 0 0 30px rgba(107, 111, 122, .16);
      transition: height .24s cubic-bezier(.22, 1, .36, 1), box-shadow .4s, background .4s, border-radius .18s ease;
    }
    .input-bottom-light {
      position: absolute;
      left: 50%;
      right: auto;
      top: 29%;
      bottom: auto;
      z-index: -2;
      width: calc(100% + 140px);
      height: calc(100% + 140px);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .input-bottom-light img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
      user-select: none;
      -webkit-user-drag: none;
      transition: opacity .30s cubic-bezier(.22, 1, .36, 1);
    }
    .input-bottom-light .light-fast {
      opacity: 0;
    }
    .input-bottom-light .light-super {
      opacity: 0;
    }
    .input-glow::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      border-radius: inherit;
      background: #335eff;
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s cubic-bezier(.22, 1, .36, 1);
    }
    .input-glow.active::after {
      opacity: 0;
    }
    body.super-mode-active .input-bottom-light .light-fast {
      opacity: 1;
      animation: colorLightBreath 2.8s ease-in-out infinite;
    }
    body.super-mode-active .input-bottom-light .light-super {
      opacity: 0;
      animation: none;
    }
    body.super-mode-active .input-glow {
      height: 108px;
    }
    /* 超能激活态：复用快速态彩色边框和彩色弥散投影 */
    .input-glow.active {
      border-radius: 20px;
      padding: 1px;
      background: linear-gradient(
        120deg,
        #ff5f45 0%,
        #ff2f67 16%,
        #ff9d1c 31%,
        #5ad957 47%,
        #22c7f2 63%,
        #6a8cff 76%,
        #ffcf32 90%,
        #ff5f45 100%
      );
      background-size: 320% 320%;
      animation: gradientShift 3.2s ease-in-out infinite;
      box-shadow: none;
      transition-delay: 0s, 0s, 0s, .06s;
    }
    body.super-mode-active .input-glow.skill-menu-open,
    body.super-mode-active .input-glow.active.skill-menu-open {
      height: 315px !important;
      border-radius: 20px;
      transition-delay: 0s;
    }
    body.super-mode-active .input-glow.skill-menu-open .input-inner {
      border-radius: 19px;
      overflow: hidden;
    }
    .skill-select-menu {
      position: absolute;
      left: 8px;
      right: 8px;
      top: 7px;
      height: 200px;
      z-index: 5;
      display: none;
      flex-direction: column;
      gap: 0;
      padding: 0;
      border-bottom: 0;
      background: #fff;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      overflow: hidden;
      transition: opacity .18s cubic-bezier(.22, 1, .36, 1), transform .22s cubic-bezier(.22, 1, .36, 1);
    }
    body.super-mode-active .input-glow.skill-menu-open .skill-select-menu {
      display: flex !important;
      opacity: 1 !important;
      transform: translateY(0);
      pointer-events: auto;
    }
    .skill-select-item {
      width: 100%;
      height: 40px;
      flex: 0 0 40px;
      padding: 4px 16px;
      border: 0;
      border-radius: 14px;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #18181b;
      cursor: pointer;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      transition: background .16s ease;
    }
    .skill-select-item:hover,
    .skill-select-item:focus-visible {
      background: #f2f2f2;
    }
    .skill-select-item.active {
      background: transparent;
    }
    .skill-select-item.active:hover {
      background: #f2f2f2;
    }
    .skill-select-item img {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }
    .skill-select-copy {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      text-align: left;
      white-space: nowrap;
    }
    .skill-select-title {
      color: #18181b;
      font-size: 14px;
      line-height: 22px;
      font-weight: 400;
      flex: 0 0 auto;
    }
    .skill-select-desc {
      color: #6b6f7a;
      font-size: 12px;
      line-height: 22px;
      font-weight: 400;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    body.super-mode-active .input-glow.skill-menu-open .input-field {
      top: auto;
      bottom: 65px;
    }
    body.super-mode-active .input-glow.skill-menu-open .input-footer {
      top: auto;
      bottom: 13px;
    }
    body.super-mode-active .input-glow.skill-menu-open .super-energy-label {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      transform: translateY(6px);
      pointer-events: none !important;
    }
    body.super-mode-active .input-glow.skill-menu-open .input-inner::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 207px;
      height: 1px;
      background: rgba(0, 0, 0, .08);
      z-index: 4;
      pointer-events: none;
    }
    @keyframes colorLightBreath {
      0%, 100% {
        opacity: .72;
        transform: scale(.985);
      }
      50% {
        opacity: 1;
        transform: scale(1.025);
      }
    }
    @keyframes superInputLightBreath {
      0%, 100% {
        opacity: .48;
        transform: scaleX(.97) scaleY(.92);
      }
      50% {
        opacity: .80;
        transform: scaleX(1) scaleY(1.04);
      }
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes inputGlowBreath {
      0%, 100% {
        box-shadow:
          0 0 18px rgba(0,136,255,.34),
          0 0 44px rgba(0,136,255,.18),
          0 0 78px rgba(0,136,255,.08);
      }
      50% {
        box-shadow:
          0 0 30px rgba(0,136,255,.68),
          0 0 78px rgba(0,136,255,.36),
          0 0 128px rgba(0,136,255,.18);
      }
    }
    .input-inner {
      position: relative;
      z-index: 6;
      background: #fff;
      border-radius: 19.5px;
      padding: 0;
      min-height: 0;
      height: 100%;
      display: block;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.66);
    }
    .super-energy-label {
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      z-index: 5;
      width: 190px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 34px 0 38px;
      box-sizing: border-box;
      border-radius: 20px;
      background: url('assets/a-353c392b81c4fd12.png') center / 100% 100% no-repeat;
      opacity: 0;
      color: #3f4046;
      box-shadow: none;
      font-size: 13px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
      visibility: hidden;
      transform: translateY(52px) scale(.985);
      pointer-events: none;
      transition:
        opacity .18s ease,
        transform .42s cubic-bezier(.16, 1, .3, 1),
        visibility 0s linear .42s;
    }
    body.super-mode-active .super-energy-label {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
      transition-delay: 0s, 0s, 0s;
    }
    .super-energy-label > img:first-child {
      display: none;
    }
    .super-energy-label span {
      display: block;
      overflow: visible;
      text-overflow: clip;
      white-space: nowrap;
    }
    .super-energy-close {
      position: absolute;
      right: 16px;
      top: 50%;
      width: 8px;
      height: 8px;
      transform: translateY(-50%);
      object-fit: contain;
      opacity: .54;
      user-select: none;
      -webkit-user-drag: none;
    }
    body.super-mode-active .input-inner {
      padding: 0;
      min-height: 0;
      height: 100%;
      display: block;
      border-radius: 19px;
    }

    .input-field {
      position: absolute;
      left: 20px;
      top: 14px;
      background: transparent;
      border: none;
      outline: none;
      color: #1d2129;
      font-size: 16px;
      line-height: 24px;
      width: calc(100% - 40px);
      resize: none;
      font-family: inherit;
      box-sizing: border-box;
      padding: 0;
      height: 28px;
      min-height: 28px;
      max-height: 196px;
      overflow: hidden;
    }
    body.super-mode-active .input-field {
      position: absolute;
      left: 20px;
      top: 14px;
      width: calc(100% - 40px);
      height: 28px;
      min-height: 28px;
      font-size: 16px;
      line-height: 24px;
      overflow: hidden;
    }
    .input-field::placeholder { color: #b9bec7; }

    .input-footer {
      position: absolute;
      left: 20px;
      right: 14px;
      bottom: 13px;
      z-index: 20001;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 32px;
      margin-top: 0;
      justify-content: space-between;
    }
    body.super-mode-active .input-footer {
      position: absolute;
      left: 20px;
      right: 14px;
      bottom: 13px;
      height: 32px;
      margin-top: 0;
    }
    .input-actions { margin-left: auto; }
    .mode-btns { display: flex; gap: 14px; align-items: center; height: 32px; }
    body:not(.super-mode-active) .mode-btns { gap: 1px; }
    body.super-mode-active .mode-btns { height: 32px; gap: 1px; }
    .mode-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      padding: 0;
      cursor: pointer;
      border: none;
      background: transparent;
      transition: opacity .18s;
      user-select: none;
    }
    .mode-btn img {
      height: 32px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }
    .mode-btn:hover { opacity: .88; }
    .super-mode {
      position: relative;
      order: 2;
      justify-content: flex-start;
      gap: 0;
      width: auto;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #1f2329;
      overflow: visible;
      box-shadow: none;
      transition:
        color .22s ease,
        opacity .18s ease,
        box-shadow .26s ease,
        background .26s ease,
        border-color .26s ease,
        padding .26s ease,
        width .26s ease;
    }
    body:not(.super-mode-active) .super-mode::after {
      content: none;
    }
    .super-mode::before {
      content: none;
      position: absolute;
      top: -40%;
      bottom: -40%;
      left: -65%;
      width: 44px;
      pointer-events: none;
      background: linear-gradient(105deg, transparent 0%, rgba(138,216,255,.12) 30%, rgba(255,255,255,.52) 50%, rgba(138,216,255,.12) 70%, transparent 100%);
      filter: blur(.2px);
      transform: translateX(0) skewX(-18deg);
      animation: superIdleSweep 2.8s ease-in-out infinite;
    }
    @keyframes superIdleSweep {
      0%, 42% { transform: translateX(0) skewX(-18deg); opacity: 0; }
      52% { opacity: .95; }
      74%, 100% { transform: translateX(170px) skewX(-18deg); opacity: 0; }
    }
    .super-mode.on {
      width: 300px;
      padding-right: 4px;
      border-color: rgba(98,224,255,.38);
      background:
        linear-gradient(180deg, rgba(80,210,255,.24), rgba(0,136,255,.12)),
        rgba(8,24,34,.82);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        0 0 20px rgba(0,136,255,.18);
      color: #8AD8FF;
    }
    .quick-mode-menu {
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      z-index: 2147483647;
      display: none;
      width: 297px;
      height: 130px;
      padding: 8px 10px;
      border: 1px solid rgba(18, 24, 33, .08);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .20);
      box-sizing: border-box;
    }
    .quick-mode-menu.open {
      display: block;
      pointer-events: auto;
    }
    body.super-mode-active #btn-super {
      z-index: 30001;
      pointer-events: auto;
    }
    body.super-mode-active #quick-mode-menu.open {
      display: block;
    }
    .quick-mode-option {
      box-sizing: border-box;
      width: 100%;
      height: 56px;
      padding: 8px 6px 0;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: #1f2329;
      font: inherit;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-align: left;
    }
    .quick-mode-option:hover {
      background: #f2f2f2;
    }
    .quick-mode-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      color: #18181b;
      margin-top: 1px;
    }
    .quick-mode-copy {
      min-width: 0;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 1px;
    }
    .quick-mode-title {
      color: #18181b;
      font-size: 16px;
      font-weight: 400;
      line-height: 22px;
      white-space: nowrap;
    }
    .quick-mode-desc {
      color: #7b818c;
      font-size: 11px;
      font-weight: 400;
      line-height: 17px;
      white-space: nowrap;
    }
    .quick-mode-option .quick-mode-check {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      margin-left: auto;
      margin-top: 3px;
      display: block;
      object-fit: contain;
      visibility: hidden;
    }
    .quick-mode-option.active .quick-mode-title {
      color: #18181b;
    }
    .quick-mode-option.active .quick-mode-icon {
      color: #18181b;
    }
    .quick-mode-option.active .quick-mode-check {
      visibility: visible;
    }
    .super-mode.on::before {
      display: none;
    }
    .super-mode-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      transition: transform .26s ease, filter .26s ease;
    }
    .super-mode.on .super-mode-icon {
      transform: scale(1.06);
      filter: drop-shadow(0 0 8px rgba(98,224,255,.65));
    }
    .super-mode-label {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: .2px;
      line-height: 1;
      white-space: nowrap;
    }
    .default-tool-img {
      display: block;
      height: 32px;
      width: auto;
      flex-shrink: 0;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }
    .super-mode > .default-tool-img {
      opacity: 1;
      transform: translateY(0);
      transition: opacity .18s ease, transform .28s cubic-bezier(.22, 1, .36, 1);
    }
    .super-mode .selected-super-img {
      position: absolute;
      left: 0;
      top: 2px;
      display: block;
      width: auto;
      height: 28px;
      flex-shrink: 0;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      opacity: 0;
      transform: translateY(5px);
      pointer-events: none;
      transition: opacity .18s ease, transform .28s cubic-bezier(.22, 1, .36, 1);
    }
    .super-context-btn {
      order: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      min-width: 0;
      max-width: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(5px);

    function updateHeroTitle(scope = '通用', isOn = document.body.classList.contains('super-mode-active')) {
      const heroTitle = document.querySelector('.hero-title-text');
      if (!heroTitle) return;

        ? (SUPER_SCOPE_TITLES[scope] || SUPER_SCOPE_TITLES['通用'])

    function setHeadingText(text, animate = false) {
      const heading = document.querySelector('.home-default-heading');
      if (!heading) return;
      const renderHeadingParts = (target, content, split = false) => {
        target.textContent = '';
        Array.from(content).forEach((char, index) => {
          const span = document.createElement('span');
          if (split) {
            span.className = 'heading-split-char';
            span.style.setProperty('--char-index', index);
            span.setAttribute('aria-hidden', 'true');
          }
          if (char === '？' || char === '?') span.classList.add('heading-question');
          span.textContent = char === ' ' ? '\u00a0' : char;
          target.appendChild(span);
        });
      };
      const animationToken = String((Number(heading.dataset.splitToken) || 0) + 1);
      heading.dataset.splitToken = animationToken;
      heading.setAttribute('aria-label', text);
      if (!animate) {
        renderHeadingParts(heading, text, false);
        return;
      }
      const renderSplitText = () => {
        if (heading.dataset.splitToken !== animationToken) return;
        renderHeadingParts(heading, text, true);
      };
      if (document.fonts && document.fonts.status !== 'loaded') {
        document.fonts.ready.then(renderSplitText);
      } else {
        renderSplitText();
      }
    }

      const metaEl = (t,l) => `<div class="chain-meta ${t}">${ICON[t]||ICON.think}${l}</div>`;

        const normalized = label.replace(/^正在/, '').replace(/^已/, '');
        updateRunStatus(RUN_STATUS_LABELS[type] || normalized || '处理中');
      };

      // 打字机：插入空 div，然后逐字填充，返回 Promise
      function typeText(html, speedMs = 18) {
        return new Promise(resolve => {
          const div = document.createElement('div');
          div.className = 'chain-text';
          ai.appendChild(div);
          // 把 html 里的标签剥出来，逐字符输出（保留 <br> <strong> 等）
          const tmp = document.createElement('div');
          tmp.innerHTML = html;
          const full = tmp.innerHTML;
          let i = 0;
          // 逐字符输出，但跳过 HTML 标签整体输出
          function tick() {
            if (i >= full.length) { resolve(); return; }
            if (full[i] === '<') {
              const end = full.indexOf('>', i);
              if (end >= 0) { i = end + 1; div.innerHTML = full.slice(0, i); } else { i++; }
            } else {
              i++;
              div.innerHTML = full.slice(0, i);
            }
            stickMessagesToBottom();
            setTimeout(tick, speedMs);

          tick();

      if (['h1','h2','h3','p','button','span','strong','li','td','th'].includes(tag)) return true;
      return el && el.children.length === 0 && (el.textContent || '').trim().length > 0;
    }

    function describeFontSize(px) {
      const value = Math.round(parseFloat(px) || 14);
      if (value <= 12) return `xs (${value}px)`;
      if (value <= 15) return `sm (${value}px)`;
      if (value <= 18) return `lg (${value}px)`;
      if (value <= 24) return `xl (${value}px)`;
      return `${value}px`;
    }

    function describeFontWeight(weight) {
      const n = parseInt(weight, 10);
      if (n >= 800) return '黑体 (Black)';
      if (n >= 700) return '粗 (Bold)';
      if (n >= 600) return '半粗 (Semibold)';
      return '常规 (Regular)';
    }

    function rgbToHex(color) {
      const match = String(color).match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([.\d]+))?\)/);
      if (!match) return '#ffffff';
      const [, r, g, b, a] = match;
      const hex = [r, g, b].map(v => Number(v).toString(16).padStart(2, '0')).join('');
      if (a !== undefined && Number(a) < 1) return `#${hex}${Math.round(Number(a) * 255).toString(16).padStart(2, '0')}`;
      return `#${hex}`;
    }

    function getTextAlignIcon(align) {
      if (align === 'center') return '≡';
      if (align === 'right') return '≡';
      if (align === 'justify') return '☰';
      return '☰';
    }

    function prepareWebsiteEditTargets() {
      const stage = document.getElementById('website-preview-stage');
      if (!stage) return;
      const selector = 'div, section, header, main, nav, article, h1, h2, h3, p, button, span, img, table, thead, tbody, tr, th, td';
      stage.querySelectorAll(selector).forEach(el => {
        el.classList.add('web-edit-target');
        el.dataset.editTag = getWebsiteEditLabel(el);
        if (getComputedStyle(el).position === 'static') {
          el.classList.add('web-edit-positioned');
        }
      });
      stage.onmouseover = event => {
        if (!websiteEditMode) return;
        const target = event.target.closest('.web-edit-target');
        if (!target || !stage.contains(target)) return;
        stage.querySelectorAll('.web-edit-hover').forEach(el => {
          if (el !== target) el.classList.remove('web-edit-hover');
        });
        target.classList.add('web-edit-hover');
        updateWebsiteHoverLabel(target);
      };
      stage.onmouseleave = () => {
        stage.querySelectorAll('.web-edit-hover').forEach(el => el.classList.remove('web-edit-hover'));
        removeWebsiteHoverLabel();
      };
      stage.onclick = event => {
        if (!websiteEditMode) return;
        const target = event.target.closest('.web-edit-target');
        if (!target || !stage.contains(target)) return;
        event.preventDefault();
        event.stopPropagation();
        openWebsiteEditPopover(target);
      };
    }

                    <div style="width:10px;height:10px;border-radius:50%;background:${s.accent};"></div>
                    <span>Meridian</span>
                  </div>
                  <span class="sr-preview-badge" style="background:${s.dark?'rgba(255,255,255,.1)':'rgba(0,0,0,.06)'};color:${s.dark?'rgba(255,255,255,.5)':'rgba(0,0,0,.4)'};">RESEARCH LAB</span>
                </div>
                <div class="sr-preview-sys">● INDEPENDENT SYSTEMS</div>
                <div class="sr-preview-h1" style="color:${s.dark?'#fff':'#111'};">Careful<br><em style="color:${s.accent};">intelligence.</em></div>
                <div class="sr-preview-sub">Reliable, interpretable systems for long-horizon work.</div>
                <div class="sr-preview-stats">
                  <div class="sr-preview-stat">ISSUE<span>014</span></div>
                  <div class="sr-preview-stat">PAPERS<span>43</span></div>
                  <div class="sr-preview-stat">LABS<span>02</span></div>
                  <div class="sr-preview-dots">
                    ${s.dots.map(c=>`<div class="sr-preview-dot" style="background:${c};"></div>`).join('')}
                  </div>
                </div>
              </div>
            </div>
            <div class="sr-info">
              <div class="sr-name">${s.name}</div>
              <div class="sr-desc">${s.desc}</div>
              <div class="sr-footer">
                <span class="sr-tag">热门</span>
                <div class="sr-palette">
                  <div class="sr-pal" style="background:${s.dark?'#fff':'#f0f0f0'};border:1px solid rgba(255,255,255,.1);"></div>
                  <div class="sr-pal" style="background:${s.accent};"></div>
                  <div class="sr-pal" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.1);"></div>
                </div>
              </div>
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    }
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.result-tab').forEach((tab, idx) => {
        tab.addEventListener('click', () => switchTab(idx));
      });
    });

    /* 首页输入框按 Enter 发送（Shift+Enter 换行） */
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.result-tab').forEach((tab, idx) => {
        tab.addEventListener('click', () => switchTab(idx));
      });
      const homeField = document.querySelector('.input-field');
      const homeGlow = document.querySelector('.input-glow');
      const homeSendButton = document.getElementById('home-send-btn');
      const baseFieldHeight = 28;
      const maxFieldHeight = baseFieldHeight + 24 * 7;

      const syncHomeInput = () => {
        homeField.style.height = `${baseFieldHeight}px`;
        const fieldHeight = Math.min(Math.max(homeField.scrollHeight, baseFieldHeight), maxFieldHeight);
        homeField.style.height = `${fieldHeight}px`;
        homeField.style.overflowY = homeField.scrollHeight > maxFieldHeight ? 'auto' : 'hidden';
        homeGlow.style.height = `${108 + fieldHeight - baseFieldHeight}px`;
        homeSendButton.disabled = homeField.value.trim().length === 0;
      };

      homeField.addEventListener('input', syncHomeInput);
      syncHomeInput();

      homeField.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
      });
      homeSendButton.addEventListener('click', sendQuery);

      const dualField = document.getElementById('dual-input');
      const dualSendButton = document.getElementById('dual-send-btn');
      const syncDualInput = () => {
        if (!dualSendButton) return;
        dualSendButton.disabled = dualField.value.trim().length === 0;
      };

      dualField.addEventListener('input', syncDualInput);
      syncDualInput();

      dualField.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDual(); }
      });
    });
  </script>

<script>
(() => {
  const block = (e) => { e.preventDefault(); e.stopPropagation(); return false; };
  document.addEventListener('contextmenu', block, true);
  document.addEventListener('dragstart', block, true);
  document.addEventListener('keydown', (e) => {
    const k = (e.key || '').toLowerCase();
    if (e.key === 'F12' || ((e.ctrlKey || e.metaKey) && ['u','s','p'].includes(k)) || ((e.ctrlKey || e.metaKey) && e.shiftKey && ['i','j','c'].includes(k))) block(e);
  }, true);
})();
</script>

</body>
