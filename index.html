<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天禧AI - 主页</title>
  <style>
    @font-face {
      font-family: "HYDaSongJ";
      src: url("deployed-assets/001-HYDaSongJ-2(2)-31f337f4.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "SongtiCustom";
      src:
        local("Songti SC Regular"),
        local("STSong");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 770px;
      overflow: hidden;
      background: #0b0b0c;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC',
                   'Microsoft YaHei', sans-serif;
    }
    body {
      position: relative;
      transform: translateZ(0);
      transform-origin: left top;
    }

    /* ── 全页背景（浏览器外壳截图） ── */
    .bg-shell {
      position: fixed;
      left: 0;
      top: 0;
      width: 1200px;
      height: 770px;
      background: url('deployed-assets/003-bg-da2fd542.png') center / cover no-repeat;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    body.dual-mode .bg-shell {
      background-image: url('deployed-assets/004-对话开始bg-0515f2b9.png');
    }
    body.dual-file-open .bg-shell {
      background-image: url('deployed-assets/005-双窗-bg-0a236d13.png');
    }
    .dual-title-shell {
      position: fixed;
      left: 0;
      top: 0;
      width: 1200px;
      height: 56px;
      z-index: 25;
      pointer-events: none;
      display: none;
      background: url('deployed-assets/006-title-7443498a.png') center top / 100% 56px no-repeat;
    }
    body.dual-file-open .dual-title-shell {
      display: block;
    }
    /* ── 内容区（覆盖在背景黑色大区域上）── */
    /* bg.png 中侧边栏约 80px，顶栏约 55px（按 2400x1540 原图） */
    .content-area {
      position: fixed;
      left: 261px;
      top: 53px;
      width: 939px;
      height: 717px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      overflow-y: auto;
    }
    .content-area::-webkit-scrollbar { display: none; }

    /* 宽度容器 */
    .content-inner {
      width: 939px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 92px;
    }

    /* ── 标题 ── */
    .hero-title {
      display: none;
      align-items: center;
      gap: 14px;
      margin-bottom: 56px;
    }
    .hero-logo {
      width: 46px;
      height: 46px;
      flex-shrink: 0;
      display: block;
      object-fit: contain;
    }
    body:not(.super-mode-active) .hero-logo {
      display: none;
    }
    .hero-copy {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hero-title-text {
      position: relative;
      display: inline-block;
      font-family: "SongtiCustom", "Songti SC", "PingFang SC", sans-serif;
      font-size: 30px;
      font-weight: 400;
      line-height: 40px;
      color: #16181d;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .hero-title-question,
    .heading-question {
      font-family: "HYDaSongJ", "Songti SC", serif;
      font-weight: 400;
      font-size: 30px;
      line-height: inherit;
    }
    .hero-super-desc {
      position: absolute;
      left: 0;
      top: calc(100% + 8px);
      max-width: 838px;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,.62);
      letter-spacing: 0;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }
    body.super-mode-active .hero-super-desc {
      opacity: 1;
    }
    .hero-title-text.super-copy {
      color: #fff;
      text-shadow: 0 0 18px rgba(98,224,255,.12);
    }
    .hero-title-text.title-sweep-once {
      color: transparent;
      background: linear-gradient(100deg, #fff 0%, #fff 38%, #8ad8ff 48%, #fff 58%, #fff 100%);
      background-size: 260% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleSweep .72s ease-out 1;
    }
    @keyframes titleSweep {
      0% { background-position: 130% 50%; }
      100% { background-position: -130% 50%; }
    }

    /* ── Tab 导航（图片） ── */
    .tab-bar {
      margin-bottom: 10px; /* Feature 图片距输入框 10px */
      margin-left: -20px;
    }
    body:not(.super-mode-active) .tab-bar {
      display: none;
    }
    .tab-bar img {
      width: 100%;
      height: auto;
      display: block;
    }
    body.super-mode-active .tab-bar {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    /* ── 输入框（彩虹光圈） ── */
    .input-wrap {
      width: 838px;
      max-width: none;
      position: fixed;
      left: auto;
      right: 51px;
      bottom: 21px;
      transform: none;
      z-index: 20000;
      margin-bottom: 0;
    }
    body.super-mode-active .input-wrap {
      width: 838px;
      left: auto;
      right: 51px;
      transform: none;
    }

    /* 彩虹渐变边框层 —— 默认态（无超能）*/
    .input-glow {
      position: relative;
      isolation: isolate;
      box-sizing: border-box;
      overflow: visible;
      border-radius: 20px;
      padding: 1.5px;
      height: 108px;
      background: linear-gradient(
        120deg,
        #ff623d 0%, #ff4e8a 14%, #bd65ff 30%,
        #4a8cff 52%, #33b7ff 72%, #31d46a 88%,
        #ffbe2e 100%
      );
      background-size: 200% 200%;
      animation: gradientShift 5.6s ease infinite;
      box-shadow: none;
      transition: height .24s cubic-bezier(.22, 1, .36, 1), box-shadow .4s, background .4s, border-radius .28s ease;
    }
    .input-bottom-light {
      position: absolute;
      left: 50%;
      right: auto;
      top: 29%;
      bottom: auto;
      z-index: -2;
      width: calc(100% + 140px);
      height: calc(100% + 140px);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .input-bottom-light img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
      user-select: none;
      -webkit-user-drag: none;
      transition: opacity .30s cubic-bezier(.22, 1, .36, 1);
    }
    .input-bottom-light .light-fast {
      opacity: 1;
    }
    .input-bottom-light .light-super {
      opacity: 0;
    }
    .input-glow::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      border-radius: inherit;
      background: #335eff;
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s cubic-bezier(.22, 1, .36, 1);
    }
    .input-glow.active::after {
      opacity: 1;
    }
    body.super-mode-active .input-bottom-light .light-fast {
      opacity: 0;
    }
    body.super-mode-active .input-bottom-light .light-super {
      opacity: .8;
      animation: superInputLightBreath 2.4s ease-in-out infinite;
    }
    body.super-mode-active .input-glow {
      height: 108px;
    }
    /* 超能激活态：#8AD8FF 流光边框 + #0088FF 弥散投影 */
    .input-glow.active {
      border-radius: 10px 20px 20px 20px;
      box-shadow: 0 0 0 2px rgba(51, 94, 255, .20);
    }
    @keyframes superInputLightBreath {
      0%, 100% {
        opacity: .48;
        transform: scaleX(.97) scaleY(.92);
      }
      50% {
        opacity: .80;
        transform: scaleX(1) scaleY(1.04);
      }
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes inputGlowBreath {
      0%, 100% {
        box-shadow:
          0 0 18px rgba(0,136,255,.34),
          0 0 44px rgba(0,136,255,.18),
          0 0 78px rgba(0,136,255,.08);
      }
      50% {
        box-shadow:
          0 0 30px rgba(0,136,255,.68),
          0 0 78px rgba(0,136,255,.36),
          0 0 128px rgba(0,136,255,.18);
      }
    }
    .input-inner {
      position: relative;
      z-index: auto;
      background: #fff;
      border-radius: 18px;
      padding: 0;
      min-height: 0;
      height: 100%;
      display: block;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.66);
    }
    .super-energy-label {
      position: absolute;
      left: -0.5px;
      top: -13px;
      z-index: 3;
      height: 22px;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 10px 0 8px;
      border-radius: 11px 11px 11px 0;
      background: #335eff;
      color: #fff;
      box-shadow: 0 5px 14px rgba(51, 94, 255, .20);
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transform: translateY(5px);
      pointer-events: none;
      transition:
        opacity .18s ease,
        transform .28s cubic-bezier(.22, 1, .36, 1),
        visibility 0s linear .28s;
    }
    body.super-mode-active .super-energy-label {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
      transition-delay: .06s, .06s, 0s;
    }
    .super-energy-label img {
      width: 14px;
      height: 14px;
      flex: 0 0 14px;
      object-fit: contain;
    }
    body.super-mode-active .input-inner {
      padding: 0;
      min-height: 0;
      height: 100%;
      display: block;
      border-radius: 8.5px 18px 18px 18px;
    }

    .input-field {
      position: absolute;
      left: 20px;
      top: 14px;
      background: transparent;
      border: none;
      outline: none;
      color: #1d2129;
      font-size: 16px;
      line-height: 24px;
      width: calc(100% - 40px);
      resize: none;
      font-family: inherit;
      box-sizing: border-box;
      padding: 0;
      height: 28px;
      min-height: 28px;
      max-height: 196px;
      overflow: hidden;
    }
    body.super-mode-active .input-field {
      position: absolute;
      left: 20px;
      top: 14px;
      width: calc(100% - 40px);
      height: 28px;
      min-height: 28px;
      font-size: 16px;
      line-height: 24px;
      overflow: hidden;
    }
    .input-field::placeholder { color: #b9bec7; }

    .input-footer {
      position: absolute;
      left: 20px;
      right: 14px;
      bottom: 13px;
      z-index: 20001;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 32px;
      margin-top: 0;
      justify-content: space-between;
    }
    body.super-mode-active .input-footer {
      position: absolute;
      left: 20px;
      right: 14px;
      bottom: 13px;
      height: 32px;
      margin-top: 0;
    }
    .input-actions { margin-left: auto; }
    .mode-btns { display: flex; gap: 14px; align-items: center; height: 32px; }
    body:not(.super-mode-active) .mode-btns { gap: 1px; }
    body.super-mode-active .mode-btns { height: 32px; gap: 1px; }
    .mode-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      padding: 0;
      cursor: pointer;
      border: none;
      background: transparent;
      transition: opacity .18s;
      user-select: none;
    }
    .mode-btn img {
      height: 32px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }
    .mode-btn:hover { opacity: .88; }
    .super-mode {
      position: relative;
      order: 2;
      justify-content: flex-start;
      gap: 0;
      width: auto;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #1f2329;
      overflow: visible;
      box-shadow: none;
      transition:
        color .22s ease,
        opacity .18s ease,
        box-shadow .26s ease,
        background .26s ease,
        border-color .26s ease,
        padding .26s ease,
        width .26s ease;
    }
    body:not(.super-mode-active) .super-mode::after {
      content: none;
    }
    .super-mode::before {
      content: none;
      position: absolute;
      top: -40%;
      bottom: -40%;
      left: -65%;
      width: 44px;
      pointer-events: none;
      background: linear-gradient(105deg, transparent 0%, rgba(138,216,255,.12) 30%, rgba(255,255,255,.52) 50%, rgba(138,216,255,.12) 70%, transparent 100%);
      filter: blur(.2px);
      transform: translateX(0) skewX(-18deg);
      animation: superIdleSweep 2.8s ease-in-out infinite;
    }
    @keyframes superIdleSweep {
      0%, 42% { transform: translateX(0) skewX(-18deg); opacity: 0; }
      52% { opacity: .95; }
      74%, 100% { transform: translateX(170px) skewX(-18deg); opacity: 0; }
    }
    .super-mode.on {
      width: 300px;
      padding-right: 4px;
      border-color: rgba(98,224,255,.38);
      background:
        linear-gradient(180deg, rgba(80,210,255,.24), rgba(0,136,255,.12)),
        rgba(8,24,34,.82);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        0 0 20px rgba(0,136,255,.18);
      color: #8AD8FF;
    }
    .quick-mode-menu {
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      z-index: 2147483647;
      display: none;
      width: 297px;
      height: 130px;
      padding: 8px 10px;
      border: 1px solid rgba(18, 24, 33, .08);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .20);
      box-sizing: border-box;
    }
    .quick-mode-menu.open {
      display: block;
      pointer-events: auto;
    }
    body.super-mode-active #btn-super {
      z-index: 30001;
      pointer-events: auto;
    }
    body.super-mode-active #quick-mode-menu.open {
      display: block;
    }
    .quick-mode-option {
      box-sizing: border-box;
      width: 100%;
      height: 56px;
      padding: 8px 6px 0;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: #1f2329;
      font: inherit;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-align: left;
    }
    .quick-mode-option:hover {
      background: #f2f2f2;
    }
    .quick-mode-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      color: #18181b;
      margin-top: 1px;
    }
    .quick-mode-copy {
      min-width: 0;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 1px;
    }
    .quick-mode-title {
      color: #18181b;
      font-size: 16px;
      font-weight: 400;
      line-height: 22px;
      white-space: nowrap;
    }
    .quick-mode-desc {
      color: #7b818c;
      font-size: 11px;
      font-weight: 400;
      line-height: 17px;
      white-space: nowrap;
    }
    .quick-mode-option .quick-mode-check {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      margin-left: auto;
      margin-top: 3px;
      display: block;
      object-fit: contain;
      visibility: hidden;
    }
    .quick-mode-option.active .quick-mode-title {
      color: #18181b;
    }
    .quick-mode-option.active .quick-mode-icon {
      color: #18181b;
    }
    .quick-mode-option.active .quick-mode-check {
      visibility: visible;
    }
    .super-mode.on::before {
      display: none;
    }
    .super-mode-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      transition: transform .26s ease, filter .26s ease;
    }
    .super-mode.on .super-mode-icon {
      transform: scale(1.06);
      filter: drop-shadow(0 0 8px rgba(98,224,255,.65));
    }
    .super-mode-label {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: .2px;
      line-height: 1;
      white-space: nowrap;
    }
    .default-tool-img {
      display: block;
      height: 32px;
      width: auto;
      flex-shrink: 0;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }
    .super-mode > .default-tool-img {
      opacity: 1;
      transform: translateY(0);
      transition: opacity .18s ease, transform .28s cubic-bezier(.22, 1, .36, 1);
    }
    .super-mode .selected-super-img {
      position: absolute;
      left: 0;
      top: 2px;
      display: block;
      width: auto;
      height: 28px;
      flex-shrink: 0;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      opacity: 0;
      transform: translateY(5px);
      pointer-events: none;
      transition: opacity .18s ease, transform .28s cubic-bezier(.22, 1, .36, 1);
    }
    .super-context-btn {
      order: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      min-width: 0;
      max-width: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(5px);
      pointer-events: none;
      transition:
        max-width .28s cubic-bezier(.22, 1, .36, 1),
        opacity .16s ease,
        transform .28s cubic-bezier(.22, 1, .36, 1),
        background-color .16s ease;
    }
    .super-context-btn img {
      display: block;
      width: auto;
      height: 32px;
      flex-shrink: 0;
      user-select: none;
      -webkit-user-drag: none;
    }
    .default-plus-img {
      height: 18px;
    }
    body.super-mode-active .default-tool-img {
      display: none;
    }
    body.super-mode-active .super-mode .super-mode-status {
      display: inline-flex;
    }
    .super-mode-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      max-width: 0;
      opacity: 0;
      transform: translateX(-6px);
      overflow: hidden;
      color: rgba(210,246,255,.88);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
      user-select: none;
      transition: max-width .28s ease, opacity .22s ease, transform .28s ease;
    }
    .super-mode.on .super-mode-status {
      max-width: 258px;
      opacity: 1;
      transform: translateX(0);
    }
    .super-mode-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #62E0FF;
      box-shadow: 0 0 10px rgba(98,224,255,.85);
      flex-shrink: 0;
    }
    .super-mode-title {
      font-weight: 500;
      letter-spacing: .2px;
    }
    .super-mode-energy {
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(98,224,255,.14);
      color: #8AD8FF;
      font-weight: 600;
      flex-shrink: 0;
      display: inline-block;
    }

    .agent-mode {
      display: none;
      justify-content: flex-start;
      gap: 6px;
      padding: 0 13px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.58);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      transition: background .18s, border-color .18s, color .18s;
    }
    .agent-mode:hover {
      background: rgba(255,255,255,.07);
      border-color: rgba(255,255,255,.2);
      color: rgba(255,255,255,.8);
    }
    .super-mode.on ~ .agent-mode {
      display: none;
    }
    .super-plus-btn {
      order: 0;
      width: 31px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      border-radius: 50%;
      background: transparent;
      color: #1f2329;
      cursor: pointer;
      box-shadow: none;
      transition: background .18s, border-color .18s, color .18s, box-shadow .18s;
    }
    .super-plus-btn svg {
      opacity: .8;
      transition: opacity .18s;
    }
    .super-plus-btn img {
      display: block;
      height: 18px;
      width: auto;
    }
    .super-plus-btn:hover {
      border-color: transparent;
      color: #111318;
      box-shadow: none;
    }
    .super-plus-btn:hover svg {
      opacity: 1;
    }
    .super-mode.on ~ .super-plus-btn {
      display: inline-flex;
    }
    body.super-mode-active .super-plus-btn {
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06)),
        rgba(18,19,21,.78);
      color: rgba(255,255,255,.78);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 0 12px rgba(255,255,255,.06);
    }
    .default-divider {
      order: 1;
      width: 1px;
      height: 24px;
      background: #dfe2e7;
      display: inline-block;
      flex-shrink: 0;
      margin: 0 3px;
    }
    .input-actions .default-divider {
      order: 0;
      margin: 0 2px;
    }
    .super-inline-btn {
      order: 3;
      height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 0;
      padding: 0;
      border: 1px solid transparent;

  <script>
    /* ── 超能模式切换 ── */
    const SUPER_SCOPE_TITLES = {

      '设计': '想法即产品，设计即代码'

    const SUPER_SCOPE_DESCS = {
      '通用': '本地运行、自主规划、 安全可控',
      '设计': '描述你的目标， 天禧AI会规划结构、生成界面并同步预览，让想法快速变成可交付设计'

    const SUPER_CARD_TITLES = {
      '通用': [
        '生成月度销售分析报告',
        '制定市场营销策略规划',
        '跨语言技术文档翻译及排版',
        '编写负责业务流程自动化脚本'

        '儿童英语 App',

      ]

    function updateSuperDesc(scope = '通用') {
      const desc = document.getElementById('hero-super-desc');
      if (desc) {
        desc.textContent = SUPER_SCOPE_DESCS[scope] || SUPER_SCOPE_DESCS['通用'];
        desc.style.opacity = '';
      }
    }

    function updateHeroTitle(scope = '通用', isOn = document.body.classList.contains('super-mode-active')) {
      const heroTitle = document.querySelector('.hero-title-text');
      if (!heroTitle) return;
      heroTitle.textContent = isOn
        ? (SUPER_SCOPE_TITLES[scope] || SUPER_SCOPE_TITLES['通用'])
        : '有什么我能帮你的吗？';
      heroTitle.classList.toggle('super-copy', isOn);
    }

    function updateSuperCards(scope = '通用') {
      const titles = SUPER_CARD_TITLES[scope] || SUPER_CARD_TITLES['通用'];
      document.querySelectorAll('#super-cards .super-card').forEach((card, i) => {
        const title = titles[i] || '';
        card.classList.toggle('hidden', !title);
        card.classList.remove('show');
        const titleEl = card.querySelector('.super-card-title');
        const img = card.querySelector('img');
        if (titleEl && title) titleEl.textContent = title;
        if (img && title) img.alt = title;
      });
    }

    function fillSuperContent(scope = '通用') {
      updateSuperDesc(scope);
      selectSuperScope(scope, true);
    }

    function setHeadingText(text, animate = false) {
      const heading = document.querySelector('.home-default-heading');
      if (!heading) return;
      const renderHeadingParts = (target, content, split = false) => {
        target.textContent = '';
        Array.from(content).forEach((char, index) => {
          const span = document.createElement('span');
          if (split) {
            span.className = 'heading-split-char';
            span.style.setProperty('--char-index', index);
            span.setAttribute('aria-hidden', 'true');
          }
          if (char === '？' || char === '?') span.classList.add('heading-question');
          span.textContent = char === ' ' ? '\u00a0' : char;
          target.appendChild(span);
        });
      };
      const animationToken = String((Number(heading.dataset.splitToken) || 0) + 1);
      heading.dataset.splitToken = animationToken;
      heading.setAttribute('aria-label', text);
      if (!animate) {
        renderHeadingParts(heading, text, false);
        return;
      }
      const renderSplitText = () => {
        if (heading.dataset.splitToken !== animationToken) return;
        renderHeadingParts(heading, text, true);
      };
      if (document.fonts && document.fonts.status !== 'loaded') {
        document.fonts.ready.then(renderSplitText);
      } else {
        renderSplitText();
      }
    }

    function applySuperState(btn, isOn, options = {}) {
      btn.classList.toggle('on', isOn);
      btn.classList.toggle('off', !isOn);
      document.body.classList.toggle('super-mode-active', isOn);
      const glow = document.querySelector('.input-glow');
      glow.classList.toggle('active', isOn);
      setHeadingText(
        isOn ? '需要我帮你完成什么任务？' : '有什么我能帮你的吗？',
        isOn
      );
      document.querySelectorAll('.quick-mode-option').forEach(option => {
        option.classList.toggle('active', option.dataset.mode === (isOn ? 'super' : 'quick'));
      });
      const field = document.querySelector('.input-field');
      if (field) {
        field.placeholder = isOn
          ? '描述你的复杂任务，在超能模式下，天禧AI将帮你深度处理'
          : '发消息…';
      }
      const toolsImg = document.getElementById('home-tools-img');
      if (toolsImg) toolsImg.src = 'deployed-assets/034-btns1-46dbb764.png';
      const defaultCards = document.getElementById('cards-default');
      if (defaultCards) defaultCards.style.display = 'none';
      closeScopeMenu();
    }

    function toggleQuickModeMenu(event) {
      event.stopPropagation();
      const menu = document.getElementById('quick-mode-menu');
      const btn = document.getElementById('btn-super');
      if (!menu || !btn) return;
      const isSuper = document.body.classList.contains('super-mode-active');
      document.querySelectorAll('.quick-mode-option').forEach(option => {
        option.classList.toggle('active', option.dataset.mode === (isSuper ? 'super' : 'quick'));
      });
      const willOpen = !menu.classList.contains('open');
      menu.classList.toggle('open', willOpen);
      btn.classList.toggle('menu-open', willOpen);
      btn.setAttribute('aria-expanded', String(willOpen));
    }

    function closeQuickModeMenu() {
      const menu = document.getElementById('quick-mode-menu');
      if (menu) menu.classList.remove('open');
      const btn = document.getElementById('btn-super');
      if (btn) {
        btn.classList.remove('menu-open');
        btn.setAttribute('aria-expanded', 'false');
      }
    }

    function selectInputMode(event, isSuper) {
      event.stopPropagation();
      const btn = document.getElementById('btn-super');
      if (btn) applySuperState(btn, isSuper);
      closeQuickModeMenu();
    }

    function toggleScopeMenu(event) {
      event.stopPropagation();
      const wrap = document.getElementById('super-scope-wrap');
      if (wrap) wrap.classList.toggle('open');
    }

    function closeScopeMenu() {
      const wrap = document.getElementById('super-scope-wrap');
      if (wrap) wrap.classList.remove('open');
    }

    function hideSuperCards() {
      const superCards = document.getElementById('super-cards');
      if (!superCards) return;
      superCards.querySelectorAll('.super-card').forEach(el => el.classList.remove('show'));
      setTimeout(() => {
        superCards.classList.remove('visible');
        superCards.classList.remove('scope-design');
      }, 200);
    }

    function showSuperCards(scope = '通用') {
      const superCards = document.getElementById('super-cards');
      if (!superCards) return;
      superCards.classList.add('visible');
      superCards.classList.toggle('scope-design', scope === '设计');
      updateSuperCards(scope);
      slideSuperCards(0, true);
      superCards.querySelectorAll('.super-card:not(.hidden)').forEach((el, i) => {
        el.classList.remove('show');
        setTimeout(() => el.classList.add('show'), 80 + i * 120);
      });
    }

    function selectSuperScope(scope, silent = false) {
      const label = document.getElementById('super-scope-label');
      if (label) label.textContent = scope;
      document.querySelectorAll('.super-scope-option').forEach(option => {
        option.classList.toggle('active', option.textContent.trim() === scope);
      });
      updateHeroTitle(scope);
      updateSuperDesc(scope);
      if (scope === '通用' || scope === '设计') showSuperCards(scope);
      else hideSuperCards();
      if (!silent) closeScopeMenu();
    }

    document.addEventListener('click', () => {
      closeScopeMenu();
      closeQuickModeMenu();
    });

    let runStatusTimer = null;
    let runStatusStart = 0;
    let runStatusTotalStart = 0;
    let runStatusFinishTimer = null;

    function setDualEnergy(value) {
      const energyEl = document.getElementById('dual-energy-value');
      const labelEl = document.querySelector('.dual-energy-label');
      if (energyEl) energyEl.textContent = value;
      if (labelEl) {
        labelEl.setAttribute('aria-label', `剩余 ${value} 能量值`);
        if (value !== '5000') {
          labelEl.classList.remove('refreshing');
          void labelEl.offsetWidth;
          labelEl.classList.add('refreshing');
        } else {
          labelEl.classList.remove('refreshing');
        }
      }
    }

    function setProductCount(value) {
      const countEl = document.getElementById('dual-product-count');
      const productBtn = document.querySelector('.dual-left-product');
      const dualView = document.getElementById('dual-view');
      if (dualView) dualView.classList.toggle('has-two-products', Number(value) >= 2);
      if (!countEl) return;
      if (countEl.textContent === String(value)) return;
      countEl.classList.remove('bumping');
      countEl.textContent = value;
      if (productBtn) productBtn.setAttribute('aria-label', `产物 ${value}`);
      void countEl.offsetWidth;
      countEl.classList.add('bumping');
    }

    function startRunStatus(label = '阅读中...') {
      const dualView = document.getElementById('dual-view');
      const labelEl = document.getElementById('dual-run-status-label');
      const timeEl = document.getElementById('dual-run-status-time');
      if (!dualView || !labelEl || !timeEl) return;

      clearInterval(runStatusTimer);
      clearTimeout(runStatusFinishTimer);
      runStatusStart = performance.now();
      runStatusTotalStart = runStatusStart;
      setDualEnergy('5000');
      labelEl.textContent = label;
      timeEl.textContent = '0.0s';
      dualView.classList.remove('run-finished');
      dualView.classList.add('running');

      runStatusTimer = setInterval(() => {
        const seconds = ((performance.now() - runStatusStart) / 1000).toFixed(1);
        timeEl.textContent = `${seconds}s`;
      }, 100);
    }

    function updateRunStatus(label) {
      const dualView = document.getElementById('dual-view');
      const labelEl = document.getElementById('dual-run-status-label');
      const timeEl = document.getElementById('dual-run-status-time');
      if (!dualView || !labelEl || !timeEl || !dualView.classList.contains('running')) return;

      clearInterval(runStatusTimer);
      clearTimeout(runStatusFinishTimer);
      runStatusStart = performance.now();
      labelEl.textContent = label;
      timeEl.textContent = '0.0s';
      runStatusTimer = setInterval(() => {
        const seconds = ((performance.now() - runStatusStart) / 1000).toFixed(1);
        timeEl.textContent = `${seconds}s`;
      }, 100);
    }

    function finishRunStatus(label = '已完成', energy = '4200') {
      const dualView = document.getElementById('dual-view');
      const labelEl = document.getElementById('dual-run-status-label');
      const timeEl = document.getElementById('dual-run-status-time');
      if (!dualView || !labelEl || !timeEl) return;

      clearInterval(runStatusTimer);
      clearTimeout(runStatusFinishTimer);
      runStatusTimer = null;
      if (runStatusTotalStart) {
        timeEl.textContent = `总耗时 ${((performance.now() - runStatusTotalStart) / 1000).toFixed(1)}s`;
      }
      labelEl.textContent = label;
      dualView.classList.remove('running');
      dualView.classList.add('run-finished');
      setDualEnergy(energy);
      runStatusFinishTimer = setTimeout(() => {
        dualView.classList.remove('run-finished');
        runStatusStart = 0;
        runStatusTotalStart = 0;
      }, 900);
    }

    function clearRunStatus() {
      const dualView = document.getElementById('dual-view');
      clearInterval(runStatusTimer);
      clearTimeout(runStatusFinishTimer);
      runStatusTimer = null;
      runStatusStart = 0;
      runStatusTotalStart = 0;
      if (dualView) dualView.classList.remove('running', 'run-finished');
      setDualEnergy('5000');
    }

    /* ── 首页发送 → 进入对话态 ── */
    function sendQuery() {
      const field = document.querySelector('.input-field');
      const text = field.value.trim();
      if (!text) return;

      document.body.classList.add('dual-mode');
      document.body.classList.remove('dual-file-open');
      document.getElementById('home-view').style.display = 'none';
      const dualView = document.getElementById('dual-view');
      dualView.classList.remove('file-open');
      dualView.classList.add('active', 'conversation-only');
      resetResultArea();
      startRunStatus('理解需求中');

      addUserBubble(text);
      field.value = '';
      field.dispatchEvent(new Event('input'));

      setTimeout(() => simulateAI(8, text), 400);
    }

    /* ── 双屏内继续发送 ── */
    function sendDual() {
      const field = document.getElementById('dual-input');
      const text = field.value.trim();
      if (!text) return;
      const dualView = document.getElementById('dual-view');
      const keepPreview = dualView && dualView.classList.contains('file-open') && /网页|应用|生成|开发|创建|页面|PC|观赛助手/.test(text);
      if (!keepPreview) resetResultArea();
      startRunStatus('理解需求中');
      addUserBubble(text);
      field.value = '';
      field.dispatchEvent(new Event('input'));
      setTimeout(() => simulateAI(8, text), 400);
    }

    /* 关闭双屏回首页 */
    function closeDual() {
      const dualView = document.getElementById('dual-view');
      dualView.classList.add('closing');
      dualView.addEventListener('animationend', () => {
        dualView.classList.remove('active', 'closing', 'conversation-only', 'file-open', 'website-open');
        clearRunStatus();
        document.body.classList.remove('dual-mode', 'dual-file-open');
        document.getElementById('home-view').style.display = '';
        document.getElementById('chat-messages').innerHTML = '';
        setProductCount(1);
        resetResultArea();
      }, { once: true });
    }

    function closePreviewToConversation() {
      const dualView = document.getElementById('dual-view');
      if (!dualView) return;
      dualView.classList.remove('file-open', 'website-open');
      dualView.classList.add('active', 'conversation-only');
      document.body.classList.remove('dual-file-open');
      switchTab(0);
      const msgs = document.getElementById('chat-messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }

    function openGeneratedFile(type = 'document') {
      const dualView = document.getElementById('dual-view');
      if (!dualView) return;
      dualView.classList.remove('conversation-only');
      void dualView.offsetWidth;
      dualView.classList.add('file-open');
      dualView.classList.toggle('website-open', type === 'website');
      document.body.classList.add('dual-file-open');
      switchTab(0);
      if (type === 'website') {
        showWorldCupWebsiteResult();
      } else {
        showWorldCupResult();
      }
    }

    function addUserBubble(text) {
      const msgs = document.getElementById('chat-messages');
      const el = document.createElement('div');
      el.className = 'bubble-user';
      const textEl = document.createElement('span');
      textEl.className = 'bubble-user-text';
      textEl.textContent = text;
      el.appendChild(textEl);
      msgs.appendChild(el);
      requestAnimationFrame(() => {
        msgs.scrollTop = msgs.scrollHeight;
      });
    }

    let superCardIndex = 0;
    function slideSuperCards(direction, reset = false) {
      const track = document.getElementById('super-cards-track');
      if (!track) return;
      const cards = track.querySelectorAll('.super-card:not(.hidden)');
      const step = 294;
      const maxIndex = Math.max(0, cards.length - 4);
      superCardIndex = reset ? 0 : Math.min(maxIndex, Math.max(0, superCardIndex + direction));
      track.style.setProperty('--super-card-offset', `${-superCardIndex * step}px`);
    }

    function resetResultArea() {
      const resultCanvas = document.getElementById('result-canvas');
      if (resultCanvas && !document.getElementById('panel-canvas')) {

        { name:'Github',      desc:'Code-forward platform. Functional density, blue-on-white precision, Primer foundations.', bg:'#f6f8fa', h1color:'#24292f', accent:'#0969da', dots:['#24292f','#0969da','#aaa'] },
        { name:'GOV.UK',      desc:'UK public-service UI. Extremely clear typography, black text, blue links, form-first...', bg:'#fff', h1color:'#0b0c0c', accent:'#1d70b8', dots:['#0b0c0c','#1d70b8','#aaa'] },
        { name:'Linear',      desc:'Project management. Ultra-minimal, precise, purple accent.',                bg:'#16141d', h1color:'#fff', accent:'#7c3aed', dark:true, dots:['#fff','#7c3aed','#555'] },
        { name:'Material',    desc:"Google's Material Design with layered surfaces, dynamic theming, built-in motion,...", bg:'#fffbfe', h1color:'#1c1b1f', accent:'#6750a4', dots:['#1c1b1f','#6750a4','#aaa'] },
        { name:'NHSUK',       desc:'Healthcare service UI with high-trust blue, readable content, urgent-state clarity, and...', bg:'#fff', h1color:'#212b32', accent:'#005eb8', dots:['#212b32','#005eb8','#aaa'] },
      ];

      const stylePanel = document.getElementById('panel-style');
      stylePanel.innerHTML = `<div class="sr-wrap">

          <span class="sr-filter-label">类型</span>

        <div class="sr-grid">

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.result-tab').forEach((tab, idx) => {
        tab.addEventListener('click', () => switchTab(idx));
      });
    });

    /* 首页输入框按 Enter 发送（Shift+Enter 换行） */
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.result-tab').forEach((tab, idx) => {
        tab.addEventListener('click', () => switchTab(idx));
      });
      const homeField = document.querySelector('.input-field');
      const homeGlow = document.querySelector('.input-glow');
      const homeSendButton = document.getElementById('home-send-btn');
      const baseFieldHeight = 28;
      const maxFieldHeight = baseFieldHeight + 24 * 7;

      const syncHomeInput = () => {
        homeField.style.height = `${baseFieldHeight}px`;
        const fieldHeight = Math.min(Math.max(homeField.scrollHeight, baseFieldHeight), maxFieldHeight);
        homeField.style.height = `${fieldHeight}px`;
        homeField.style.overflowY = homeField.scrollHeight > maxFieldHeight ? 'auto' : 'hidden';
        homeGlow.style.height = `${108 + fieldHeight - baseFieldHeight}px`;
        homeSendButton.disabled = homeField.value.trim().length === 0;
      };

      homeField.addEventListener('input', syncHomeInput);
      syncHomeInput();

      homeField.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
      });
      homeSendButton.addEventListener('click', sendQuery);

      const dualField = document.getElementById('dual-input');
      const dualSendButton = document.getElementById('dual-send-btn');
      const syncDualInput = () => {
        if (!dualSendButton) return;
        dualSendButton.disabled = dualField.value.trim().length === 0;
      };

      dualField.addEventListener('input', syncDualInput);
      syncDualInput();

      dualField.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDual(); }
      });
    });
  </script>
